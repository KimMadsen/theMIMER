; =========================================================================
; theMIMER.settings.providers.ini - LLM Provider Registry
; =========================================================================
;
; Copyright 2026 Components4Developers - Kim Bo Madsen
; Proprietary Commercial License
;
; PURPOSE
; -------
; This file defines all available LLM backends (local and external) and
; their capabilities. The provider registry enables intelligent model
; routing: theMIMER selects the best provider for each task based on
; capability requirements, cost, availability, and selection strategy.
;
; STRUCTURE
; ---------
; [LLMProviders]        - Header with total provider count
; [LLMProvider.N]       - Individual provider definitions (1-based index)
; [LLMSelection]        - Global provider selection rules
; [LLMQueryRouting]     - Per-complexity/intent provider mapping
; [LLMUsage]            - Usage tracking and logging
;
; COMPANION FILE
; --------------
; Place this file next to your main settings file with the same base name:
;   theMIMER.settings.ini              -> main settings
;   theMIMER.settings.providers.ini    -> this file (provider desciptions)
;
; PROVIDER TYPES
; --------------
;   local        - Built-in llama.cpp model loaded from a GGUF file.
;                  Runs entirely on local hardware (CPU/GPU).
;
;   openai       - OpenAI-compatible REST API. Works with OpenAI, Groq,
;                  Together, Mistral, DeepSeek, Google Gemini (via their
;                  OpenAI-compatible endpoint), and any other service that
;                  implements the /v1/chat/completions endpoint.
;
;   anthropic    - Anthropic Claude API. Uses a different authentication
;                  header (x-api-key + anthropic-version) than OpenAI.
;
;   openai_image - OpenAI image generation API (DALL-E). For text-to-image
;                  generation via the /v1/images/generations endpoint.
;
; IDENTITY FIELDS
; ---------------
;   Name         - Internal identifier used in routing rules and logs.
;                  Convention: <Vendor>.<Model> (e.g., Local.Main, Google.Gemini)
;   Caption      - Human-readable display name shown in status output.
;
; LOCAL MODEL FIELDS (Type=local)
; --------------------------------
;   ModelPath      - Path to the GGUF model file. Relative to the
;                    executable directory or an absolute path.
;   ClipModelPath  - Path to the CLIP projector GGUF for vision.
;                    Only needed for vision-capable models. Leave empty
;                    if the model does not support vision.
;   GPULayers      - Number of model layers to offload to the GPU.
;                      99 = all layers (recommended if VRAM allows)
;                      0  = CPU only
;   ContextSize    - Context window size in tokens.
;                      0 = use model's default
;   BatchSize      - Batch size for prompt processing.
;                      512  = conservative
;                      2048 = standard
;   Threads        - CPU threads (0 = auto-detect)
;   FlashAttention - Use flash attention (0/1). Requires GPU support.
;   MaxConcurrent  - Number of KV cache slots for parallel sessions.
;                    Each slot reserves memory for one active inference.
;
; EXTERNAL API FIELDS (Type=openai, anthropic, openai_image)
; -----------------------------------------------------------
;   BaseURL        - API endpoint URL (without trailing slash).
;   ApiKey         - Authentication key for the API.
;   Model          - Model identifier string sent in API requests.
;   Timeout        - Request timeout in milliseconds.
;   ApiVersion     - API version header (Anthropic only, e.g. "2023-06-01")
;
; SAMPLING DEFAULTS
; -----------------
; Each provider can define its own sampling defaults. These override the
; global [Sampling] section in the main settings file when this provider
; is active.
;
;   Temperature    - Randomness (0.0-2.0)
;   TopK           - Top-K sampling (0 = disabled)
;   TopP           - Nucleus sampling (0.0-1.0)
;   MinP           - Minimum probability threshold
;   RepeatPenalty  - Repeat token penalty (1.0 = none)
;   RepeatLastN    - Window size for repeat check
;   Seed           - Random seed (0 = random)
;
; CAPABILITY AND COST
; --------------------
;   Capability       - Overall capability score (1-10). Used for fallback
;                      ordering and minimum capability filters.
;                        1-3 = basic (routing, reranking only)
;                        4-6 = moderate (simple chat, summaries)
;                        7-8 = good (code, analysis, creative)
;                        9-10 = excellent (complex reasoning, evaluation)
;
;   CostPerKTokenIn  - Cost per 1000 input tokens in USD.
;                      Set to 0 for local models.
;   CostPerKTokenOut - Cost per 1000 output tokens in USD.
;   CostPerImage     - Cost per generated image (for openai_image).
;
;   Priority         - Preference order when multiple providers match.
;                      Lower number = tried first.
;
;   Enabled          - 0 = disabled (skipped during selection), 1 = active.
;   MaxConcurrent    - Maximum parallel requests to this provider.
;   MaxTokens        - Maximum tokens per response from this provider.
;
; CAPABILITIES LIST
; -----------------
;   The Capabilities field defines what this provider can do. It controls
;   which providers are selected for which tasks.
;
;   Syntax:
;     +all                 - Start with ALL capabilities enabled
;     -pcCapabilityName    - Remove a specific capability
;     pcCap1,pcCap2,...    - Explicit list of capabilities
;
;   Available capabilities:
;
;   Text generation:
;     pcTextGeneration     - Basic text/chat generation
;     pcCreativeWriting    - Stories, poetry, creative content
;
;   Code:
;     pcCodeWrite          - Write new code
;     pcCodeDebug          - Find and fix bugs
;     pcCodeRefactor       - Improve/restructure code
;     pcCodeReview         - Review code quality
;     pcCodeExplain        - Explain code behavior
;
;   Vision:
;     pcVisionDescribe     - Describe image contents
;     pcVisionOCR          - Extract text from images
;     pcVisionAnalyze      - Detailed image analysis
;     pcVisionCompare      - Compare multiple images
;
;   Image generation:
;     pcImageGenerate      - Text-to-image generation
;     pcImageEdit          - Edit/inpaint images
;
;   Audio:
;     pcAudioTranscribe    - Speech-to-text
;     pcAudioGenerate      - Text-to-speech
;
;   Evaluation:
;     pcEvaluateText       - Judge text quality
;     pcEvaluateCode       - Judge code quality
;     pcEvaluateSelfImprove - Self-improvement scoring
;
;   Synthesis:
;     pcSynthesizePrompts  - Generate test prompts
;     pcGenerateSkills     - Create skill files
;     pcSynthesizeResponses - Merge multiple responses
;
;   Infrastructure:
;     pcRouting            - Query classification/routing
;     pcReranking          - Score/reorder retrieval results
;     pcSummarization      - Compress/summarize text
;     pcQueryRewrite       - HyDE, query expansion
;
;   Thinking:
;     pcThinkingCritique   - Critic persona role
;     pcThinkingAdvocate   - Advocate persona role
;     pcThinkingSynthesis  - Synthesize debate results
;     pcThinkingCode       - Code analysis persona
;     pcThinkingMeta       - Meta-orchestration
;
;   Specialized:
;     pcRAGIngestion       - Bulk processing for RAG
;     pcDocumentation      - Documentation generation
;
; FALLBACK
; --------
;   AllowFallbackFrom - Allow fallback FROM this provider to others (0/1).
;                       When 1, if this provider fails, the system will
;                       try another provider. When 0, failure is final.
;   AllowFallbackTo   - Allow fallback TO this provider from others (0/1).
;                       When 1, this provider is a valid fallback target.
;                       When 0, this provider is skipped during fallback.
;
; =========================================================================


[LLMProviders]
; Count: Total number of [LLMProvider.N] sections below.
Count=7


; =========================================================================
; Provider 1: Local Main Model
; =========================================================================
; Primary local LLM for most tasks. This is the workhorse model that
; handles chat, code, analysis, and (optionally) vision.
;
; Recommended models (Q8_0 quantization for best quality):
;   - Qwen2.5-7B-Instruct           (7B, general purpose)
;   - Qwen3.5-9B                    (9B, strong code + chat)
;   - Llama-3.1-8B-Instruct         (8B, good all-rounder)
;   - Mistral-Small-24B-Instruct    (24B, excellent but needs 24GB+ VRAM)
;
; For vision, use a model with a matching mmproj CLIP file.
; =========================================================================
[LLMProvider.1]
Name=Local.Main
Caption=Qwen 9B (Local)
Type=local
ModelPath=Qwen3.5-9B-Q8_0.gguf
; ClipModelPath: Set this to enable vision. Must match the main model.
; Leave empty to disable vision for this provider.
; Example: mmproj-Qwen3.5-9B-BF16.gguf
ClipModelPath=
GPULayers=99
ContextSize=32768
BatchSize=2048
Threads=0
FlashAttention=1
MaxConcurrent=2
MaxTokens=4096

; Sampling defaults for the main model
Temperature=0.70
TopK=40
TopP=0.95
MinP=0.05
RepeatPenalty=1.10
RepeatLastN=64
Seed=0

Capability=7
CostPerKTokenIn=0
CostPerKTokenOut=0
Priority=2
Enabled=1

; Good at most things. Remove capabilities the model genuinely lacks.
; Vision capabilities require ClipModelPath to be set.
; Remove pcVision* if no clip model is configured.
Capabilities=pcTextGeneration,pcCreativeWriting,pcCodeWrite,pcCodeDebug,pcCodeRefactor,pcCodeReview,pcCodeExplain,pcEvaluateText,pcEvaluateCode,pcSynthesizeResponses,pcSummarization,pcQueryRewrite,pcThinkingCritique,pcThinkingAdvocate,pcThinkingSynthesis,pcThinkingCode,pcThinkingMeta,pcRAGIngestion,pcDocumentation

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 2: Local Small Model
; =========================================================================
; Fast, lightweight model for infrastructure tasks: routing queries to
; the correct pipeline, reranking retrieval results, summarizing context,
; and rewriting queries. Not used for direct user-facing responses.
;
; Recommended models:
;   - Qwen2.5-1.5B-Instruct  (1.5B, very fast, good for routing)
;   - Qwen2.5-3B-Instruct    (3B, better judgment, still fast)
;   - Phi-3-mini-4k           (3.8B, good reasoning for its size)
; =========================================================================
[LLMProvider.2]
Name=Local.Small
Caption=Qwen 1.5B (Fast)
Type=local
ModelPath=qwen2.5-1.5b-instruct-q5_k_m.gguf
GPULayers=99
ContextSize=8192
BatchSize=512
Threads=0
FlashAttention=1
MaxConcurrent=2
MaxTokens=1024

; Lower temperature for more deterministic infrastructure decisions
Temperature=0.3
TopK=20
TopP=0.9
MinP=0.05
RepeatPenalty=1.05
RepeatLastN=32
Seed=0

Capability=3
CostPerKTokenIn=0
CostPerKTokenOut=0
Priority=1
Enabled=1

; Only infrastructure tasks - not used for direct responses.
; Add pcRouting here if you want the small model to handle query routing.
; Routing with small models can be fast but may misclassify complex queries.
Capabilities=pcReranking,pcSummarization,pcQueryRewrite

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 3: Google Gemini (Optional - External)
; =========================================================================
; Google Gemini via their OpenAI-compatible endpoint. Very large context
; window (1M tokens) and competitive pricing. Good for analysis,
; evaluation, and self-improvement scoring.
;
; Available models:
;   gemini-2.5-flash       - Fast, cost-effective, very large context
;   gemini-2.5-flash-lite  - Even cheaper, slightly less capable
;   gemini-3.1-pro         - Highest quality, slower, more expensive
;
; Get an API key at: https://aistudio.google.com/apikey
; =========================================================================
[LLMProvider.3]
Name=Google.Gemini
Caption=Gemini 2.5 Flash
Type=openai
BaseURL=https://generativelanguage.googleapis.com/v1beta/openai
ApiKey=YOUR_GEMINI_API_KEY_HERE
Model=gemini-2.5-flash
Capability=8
CostPerKTokenIn=0.000075
CostPerKTokenOut=0.00030
Priority=3
Enabled=0
MaxConcurrent=10
Timeout=120000
MaxTokens=8192

; Very large context (1M tokens), good at most tasks
Capabilities=+all,-pcImageGenerate,-pcImageEdit,-pcAudioTranscribe,-pcAudioGenerate

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 4: Anthropic Claude (Optional - External)
; =========================================================================
; Anthropic Claude API. Excellent for evaluation, complex reasoning,
; code review, and self-improvement scoring. Uses a different auth
; mechanism than OpenAI (x-api-key header + anthropic-version).
;
; Available models:
;   claude-sonnet-4-20250514  - Best balance of quality and cost
;   claude-haiku-4-5-20251001 - Faster, cheaper, good for simpler tasks
;   claude-opus-4-6           - Highest quality, most expensive
;
; Get an API key at: https://console.anthropic.com/
; =========================================================================
[LLMProvider.4]
Name=Anthropic.Claude
Caption=Claude Sonnet 4
Type=anthropic
BaseURL=https://api.anthropic.com/v1
ApiKey=YOUR_ANTHROPIC_API_KEY_HERE
Model=claude-sonnet-4-20250514
Capability=9
CostPerKTokenIn=0.003
CostPerKTokenOut=0.015
Priority=4
Enabled=0
MaxConcurrent=5
Timeout=120000
MaxTokens=8192
; ApiVersion: Required for the Anthropic API. Do not change unless
; Anthropic publishes a new API version.
ApiVersion=2023-06-01

; Excellent evaluator and reasoner
Capabilities=+all,-pcImageGenerate,-pcImageEdit,-pcAudioTranscribe,-pcAudioGenerate

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 5: OpenAI (Optional - External)
; =========================================================================
; OpenAI GPT models via their standard API. Good general-purpose models.
;
; Available models:
;   gpt-4o            - Flagship multimodal model
;   gpt-4o-mini       - Faster, cheaper, good for most tasks
;   o3-mini           - Reasoning-optimized
;
; Get an API key at: https://platform.openai.com/api-keys
; =========================================================================
[LLMProvider.5]
Name=OpenAI.GPT
Caption=GPT-4o
Type=openai
BaseURL=https://api.openai.com/v1
ApiKey=YOUR_OPENAI_API_KEY_HERE
Model=gpt-4o
Capability=9
CostPerKTokenIn=0.0025
CostPerKTokenOut=0.010
Priority=4
Enabled=0
MaxConcurrent=5
Timeout=120000
MaxTokens=4096

; Strong all-rounder with vision
Capabilities=+all,-pcImageGenerate,-pcImageEdit,-pcAudioTranscribe,-pcAudioGenerate

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 6: DeepSeek (Optional - External)
; =========================================================================
; DeepSeek models via their OpenAI-compatible API. Strong at code and
; reasoning tasks, very competitive pricing.
;
; Available models:
;   deepseek-chat      - General-purpose chat model
;   deepseek-reasoner  - Reasoning-optimized (chain-of-thought)
;
; Get an API key at: https://platform.deepseek.com/
; =========================================================================
[LLMProvider.6]
Name=DeepSeek.Chat
Caption=DeepSeek Chat
Type=openai
BaseURL=https://api.deepseek.com/v1
ApiKey=YOUR_DEEPSEEK_API_KEY_HERE
Model=deepseek-chat
Capability=8
CostPerKTokenIn=0.00014
CostPerKTokenOut=0.00028
Priority=3
Enabled=0
MaxConcurrent=5
Timeout=120000
MaxTokens=4096

; Strong at code and reasoning
Capabilities=pcTextGeneration,pcCreativeWriting,pcCodeWrite,pcCodeDebug,pcCodeRefactor,pcCodeReview,pcCodeExplain,pcEvaluateText,pcEvaluateCode,pcSynthesizeResponses,pcThinkingCritique,pcThinkingAdvocate,pcThinkingSynthesis,pcThinkingCode,pcDocumentation

AllowFallbackFrom=1
AllowFallbackTo=1


; =========================================================================
; Provider 7: OpenAI DALL-E (Optional - Image Generation)
; =========================================================================
; OpenAI's DALL-E image generation API. Use this as an alternative or
; supplement to local Stable Diffusion.
;
; Note: This provider is only used when [ImageGeneration].Provider=openai
; in the main settings file.
; =========================================================================
[LLMProvider.7]
Name=OpenAI.DallE
Caption=DALL-E 3
Type=openai_image
BaseURL=https://api.openai.com/v1
ApiKey=YOUR_OPENAI_API_KEY_HERE
Model=dall-e-3
Capability=8
CostPerImage=0.040
Priority=5
Enabled=0
MaxConcurrent=3
Timeout=120000

Capabilities=pcImageGenerate

AllowFallbackFrom=0
AllowFallbackTo=0


; =========================================================================
; [LLMSelection] - Provider selection rules
; =========================================================================
; Controls how theMIMER selects among available providers when multiple
; providers match a capability requirement.
;
; Selection strategies:
;   local_first        - Prefer local providers, then external by priority
;   external_first     - Prefer external providers, then local
;   highest_capability - Use provider with highest Capability score
;   lowest_cost        - Use cheapest provider
;   round_robin        - Rotate through all matching providers. Providers
;                        are ordered by Priority (lower first) and the
;                        system cycles through them in that order.
; =========================================================================
[LLMSelection]
; DefaultStrategy: Strategy used when no specific strategy is defined
; for the current task.
;   local_first    - good for privacy, speed, and offline use
;   external_first - good when external models are more capable
DefaultStrategy=local_first

; --- Self-Improvement Evaluation ---
; The self-improvement loop evaluates MIMER's own responses. Using an
; external model prevents self-evaluation bias.

; SelfImproveEvalStrategy: Provider selection for evaluation scoring.
SelfImproveEvalStrategy=external_first

; SelfImproveEvalAllowSelfEval: Allow the model that generated the
; response to also evaluate it.
;   0 = use a different model for evaluation (recommended for objectivity)
;   1 = allow self-evaluation
SelfImproveEvalAllowSelfEval=0

; SelfImproveEvalMinCapability: Minimum capability score for evaluators.
SelfImproveEvalMinCapability=8

; SelfImproveEvalFallbackToLocal: Fall back to local model if no
; external evaluator is available.
;   0 = skip evaluation if no external model available
;   1 = use local model as last resort
SelfImproveEvalFallbackToLocal=1

; --- Response Synthesis ---
; When multiple personas generate partial answers, the synthesizer
; merges them into a final response.

; SynthesisStrategy: Provider selection for response synthesis.
SynthesisStrategy=highest_capability

; SynthesisMinCapability: Minimum capability for the synthesizer.
SynthesisMinCapability=7

; --- Escalation ---
; Automatic escalation to a more capable provider when the current
; provider fails or produces low-quality output.

; EscalateOnFailure: Escalate when a provider returns an error.
;   0 = fail immediately
;   1 = try a different provider
EscalateOnFailure=1

; EscalateOnLowQuality: Escalate when the response quality score
; is below EscalateQualityThreshold.
;   0 = accept any quality
;   1 = escalate on low quality
EscalateOnLowQuality=1

; EscalateQualityThreshold: Score (0-10) below which escalation triggers.
EscalateQualityThreshold=5.0

; MaxEscalations: Maximum number of escalation attempts per query.
MaxEscalations=2

; --- Cost Controls ---
; Prevent runaway costs from external API usage.

; MaxCostPerDay: Maximum total API cost per day in USD.
;   0 = no limit
MaxCostPerDay=5.00

; MaxCostPerSession: Maximum API cost per chat session in USD.
MaxCostPerSession=1.00

; WarnAtCostPercent: Show a warning when cost reaches this percentage
; of the daily limit.
WarnAtCostPercent=80


; =========================================================================
; [LLMQueryRouting] - Query routing by complexity and intent
; =========================================================================
; The router classifies each query by INTENT (what the user wants) and
; COMPLEXITY (how hard it is), then uses this table to select the
; optimal provider. Falls back to capability-based selection if no
; mapping exists for the intent/complexity combination.
;
; Speed hints (user can prefix their query with these):
;   @fast   - Use the fastest available provider
;   @best   - Use the highest capability provider
;   @local  - Force a local provider (for privacy)
;   @cloud  - Force an external provider
;
; Complexity levels:
;   simple   - Greetings, yes/no, single facts
;   moderate - Normal Q&A, explanations, code snippets
;   complex  - Deep analysis, research, long-form generation
;
; Intents:
;   factual        - Factual questions, lookups
;   code           - Code writing, debugging, review
;   howto          - How-to instructions, tutorials
;   conversational - Casual chat, greetings
;   creative       - Stories, writing, brainstorming
;   analysis       - Deep analysis, comparisons
;   comparison     - Comparing alternatives
;   external       - Questions requiring web/external knowledge
; =========================================================================
[LLMQueryRouting]
; Enabled: Enable intent/complexity-based provider routing.
;   0 = always use DefaultStrategy from [LLMSelection]
;   1 = route based on query classification
Enabled=1

; Speed hint overrides (take precedence over complexity/intent routing)
FastProvider=Local.Small
BestProvider=Local.Main
LocalProvider=Local.Main
ExternalProvider=Local.Main

; Default providers per complexity (used when no intent match)
Simple.Default=Local.Main
Moderate.Default=Local.Main
Complex.Default=Local.Main

; Simple queries - local model is sufficient
Simple.factual=Local.Main
Simple.conversational=Local.Main
Simple.howto=Local.Main

; Moderate queries - local for most tasks
Moderate.factual=Local.Main
Moderate.code=Local.Main
Moderate.howto=Local.Main
Moderate.conversational=Local.Main
Moderate.creative=Local.Main
Moderate.analysis=Local.Main

; Complex queries - local for now, change to external if enabled
; When you enable an external provider (e.g. Google.Gemini), you can
; route complex tasks to it for higher quality:
;   Complex.code=Google.Gemini
;   Complex.analysis=Google.Gemini
Complex.factual=Local.Main
Complex.code=Local.Main
Complex.howto=Local.Main
Complex.creative=Local.Main
Complex.analysis=Local.Main
Complex.comparison=Local.Main
Complex.external=Local.Main


; =========================================================================
; [LLMUsage] - Usage tracking and logging
; =========================================================================
[LLMUsage]
; UsageStatsPath: File path for aggregated usage statistics (JSON).
UsageStatsPath=llm_usage_stats.json

; ResetInterval: How often to reset cumulative usage stats.
;   daily   - Reset every day at midnight
;   weekly  - Reset every Monday
;   monthly - Reset on the 1st of each month
;   never   - Never reset (keep all history)
ResetInterval=monthly

; LogRequests: Log individual LLM requests for debugging.
;   0 = no request logging
;   1 = log each request with prompt, response, timing, cost
LogRequests=0

; LogPath: File path for request logs (when LogRequests=1).
LogPath=llm_requests.log
