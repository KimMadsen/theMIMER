; =========================================================================
; theMIMER.settings.rules.ini - Query Rules and Router Extensions
; =========================================================================
;
; Copyright 2026 Components4Developers - Kim Bo Madsen
; Proprietary Commercial License
;
; PURPOSE
; -------
; Query rules intercept user queries BEFORE they reach the LLM router.
; They use keyword matching and regex patterns to detect specific query
; types and apply specialized handling: scoped retrieval, forced intents,
; custom system prompts, code agent activation, and more.
;
; Router extensions define custom intents and output keys that the LLM
; router can produce beyond its built-in set.
;
; STRUCTURE
; ---------
; [Rules]                    - Header with rule count and name list
; [Rule.<Name>]              - Individual rule definitions
; [RouterExtensions]         - Custom intents and output keys
;
; COMPANION FILE
; --------------
; Place this file next to your main settings file with the same base name:
;   theMIMER.settings.ini          -> main settings
;   theMIMER.settings.rules.ini    -> this file (rules and router extensions)
;
; RUNTIME COMMANDS
; ----------------
;   /rules reload            - Reload rules from file
;   /rules save              - Save current rules to file
;   /rules list              - List all active rules
;   /rules show <n>          - Show details of rule N
;   /rules enable <n>        - Enable rule N
;   /rules disable <n>       - Disable rule N
;   /rules extensions        - View router extensions
;
; HOW RULES WORK
; --------------
; 1. Each incoming query is tested against all enabled rules
; 2. Rules are evaluated in Priority order (lower number = higher priority)
; 3. The FIRST matching rule wins and applies its settings
; 4. If no rule matches, the query goes to the LLM router for
;    classification as normal
;
; MATCHING
; --------
; Rules match using a combination of:
;
;   Keywords       - Comma-separated trigger words. The query must
;                    contain at least MinKeywordMatches of these words.
;                    Matching is case-insensitive.
;
;   PatternRegex   - Regular expression tested against the query.
;                    Uses case-insensitive matching by default.
;                    Leave empty to match on keywords only.
;
;   MatchMode      - How Keywords and PatternRegex interact:
;                      any = keywords OR regex triggers the rule (default)
;                      and = BOTH keywords AND regex must match (strict)
;
;   IntentMatch    - Match when the LLM router classifies the query as
;                    this intent. Useful for catching intents that are
;                    hard to express with regex.
;
;   MinKeywordMatches - Minimum number of keywords that must appear
;                       in the query. Default: 1.
;
; RULE ACTIONS
; ------------
; When a rule matches, it can apply any combination of these settings:
;
;   ForceIntent      - Override the router's intent classification.
;                      Built-in intents: factual, code, howto,
;                      conversational, creative, analysis, comparison,
;                      deep_technical, fact_lookup, external
;
;   CustomIntent     - Set a custom intent (defined in RouterExtensions).
;
;   SystemSuffix     - Additional system prompt text injected into the
;                      LLM context. Use to give the model special
;                      instructions for this type of query.
;
;   ForceResponse    - Return this text directly, bypassing the LLM.
;                      Useful for static help messages.
;
;   SkipRetrieval    - Control RAG retrieval:
;                        0  = force retrieval OFF
;                        1  = force retrieval ON
;                        -1 = let the router decide (default)
;
;   TopKOverride     - Override the number of retrieval chunks for
;                      this rule. 0 = use default from [Retrieval].
;
;   Decompose        - Enable/disable query decomposition:
;                        0 = do not decompose
;                        1 = decompose into sub-questions
;                        -1 = let the router decide
;
;   InjectAnchors    - Inject knowledge base anchor terms:
;                        0 = no anchors
;                        1 = inject anchors
;                        -1 = let the router decide
;
;   UseHyDE          - Use Hypothetical Document Embedding for retrieval:
;                        0 = disabled
;                        1 = enabled
;
;   ExpandQuery      - Enable query expansion (meta-prompting):
;                        0 = disabled
;                        1 = enabled
;
;   RefineWithSource - Refine the answer using source documents:
;                        0 = disabled
;                        1 = enabled
;
;   UseCodeAgent     - Activate the code agent for this query:
;                        0 = no code agent
;                        1 = activate code agent
;
;   CodeToolHints    - Comma-separated list of code tools to prefer.
;                      Examples: code_analyze, file_read, file_modify,
;                      file_copy, file_create, dependency_trace
;
;   UseUploadAgent   - Activate the upload/workspace agent:
;                        0 = no upload agent
;                        1 = activate upload agent
;
;   DirectToolAnswer - Let the tool output be the final answer:
;                        0 = agent synthesizes tool output into prose
;                        1 = return tool output directly
;
;   DeepRetrieval    - Use deep retrieval (more thorough, slower):
;                        0 = normal retrieval
;                        1 = deep retrieval
;
;   RandomSample     - Retrieve N random chunks instead of similarity
;                      search. Useful for "surprise me" type queries.
;
; FILE SCOPE CAPTURE
; ------------------
; Many rules use a regex lookahead to extract a filename from the query.
; When present, the filename is used to scope retrieval to that specific
; file, dramatically improving precision.
;
;   ScopeCaptureGroup - Which regex capture group contains the filename.
;                       The captured text is used as a SourceScope filter.
;                       0 = no scope capture
;                       1 = first capture group (most common)
;
; The standard filename capture pattern is:
;   (?=.*\b(\w+\.(?:pas|dpr|inc|...))\b)?
;
; This optionally captures a filename like "MyUnit.pas" from anywhere
; in the query. When absent, the lookahead silently passes.
;
; SCAN PATTERNS (for listing rules)
; ----------------------------------
; Some rules scan source files for structural elements (classes,
; functions, interfaces) and present them as lists.
;
;   ScanPattern  - Regex for extracting code elements from source files.
;   ScanLabel    - Label for the scan results (e.g., "Classes/Types").
;   ScanPrompt   - Optional LLM instruction for formatting scan results.
;
; =========================================================================


[Rules]
; Count: Total number of rules defined below.
Count=24

; Rule name list (for display and reference)
Name.1=SelfIdentity
Name.2=Jokes
Name.3=QuickFact
Name.4=DeepDiveRequest
Name.5=ExploratoryRedirect
Name.6=ExploratoryGrounded
Name.7=ExploratoryDiscover
Name.8=ListClassesDetailed
Name.9=ListClasses
Name.10=ListInterfacesDetailed
Name.11=ListInterfaces
Name.12=ListFunctionsDetailed
Name.13=ListFunctions
Name.14=ListFeaturesDetailed
Name.15=ListFeatures
Name.16=struct_code_count
Name.17=struct_code_list
Name.18=struct_code_explain
Name.19=struct_code_questions
Name.20=UploadedDocScope
Name.21=CodeFileScope
Name.22=FileScopeGeneric
Name.23=FileScopeCapture
Name.24=image_generation


; =========================================================================
; RULE: SelfIdentity - Respond to "who are you?" / "what is theMIMER?"
; =========================================================================
; Handles questions about the assistant's own identity.
; Skips retrieval (the answer is baked into the system prompt).
; =========================================================================
[Rule.SelfIdentity]
Priority=1
Enabled=1
MatchMode=any
IntentMatch=self_identity
Keywords=theMIMER,MIMER
SkipRetrieval=1
ForceIntent=conversational
SystemSuffix=You are theMIMER (MIMER Is Mythical Enhanced Reasoning). You are an intelligent knowledge assistant built on RAG technology. Your capabilities include: knowledge retrieval, multi-model support, thinking strategies, vision, image generation, agentic tools, and OpenAI-compatible API. Respond in the same language the user is using.


; =========================================================================
; RULE: Jokes - Respond with humor
; =========================================================================
[Rule.Jokes]
Priority=10
Enabled=1
Keywords=joke,funny,humor,haha,lol,knock knock,tell me something funny
PatternRegex=
ForceIntent=conversational
SkipRetrieval=1
SystemSuffix=You are a witty programmer. Respond with programming humor related to the language or framework being discussed. Keep it light and fun.
CustomIntent=joke


; =========================================================================
; RULE: QuickFact - Minimal retrieval for "quick question" patterns
; =========================================================================
[Rule.QuickFact]
Priority=50
Enabled=1
Keywords=quick question,briefly,in short,one-liner,tldr
PatternRegex=
ForceIntent=fact_lookup
Decompose=0
InjectAnchors=-1
UseHyDE=0
ExpandQuery=0
RefineWithSource=0
SkipRetrieval=-1
SystemSuffix=Give a concise, direct answer. No lengthy explanations.
TopKOverride=5


; =========================================================================
; RULE: DeepDiveRequest - Full depth for "explain in detail"
; =========================================================================
; Captures an optional filename for scoped retrieval.
; Works across all supported code and document languages.
; =========================================================================
[Rule.DeepDiveRequest]
Priority=50
Enabled=1
PatternRegex=(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs|txt|md|pdf|csv|json|xml|html|log|yaml|yml))\b)?(explain|describe|tell me).*(in detail|deeply|thoroughly|everything)
ScopeCaptureGroup=1
ForceIntent=deep_technical
Decompose=1
InjectAnchors=1
UseHyDE=1
ExpandQuery=1
RefineWithSource=1
SkipRetrieval=-1
SystemSuffix=The user has asked for a detailed explanation. Be thorough and comprehensive. Include code examples where relevant.
TopKOverride=25


; =========================================================================
; RULES: Exploratory - "surprise me" / "something interesting"
; =========================================================================
; Three rules handle exploratory queries with decreasing specificity:
; 1. ExploratoryRedirect - Suggests specific commands
; 2. ExploratoryGrounded - Answers from context only
; 3. ExploratoryDiscover - Picks a random interesting item
; =========================================================================
[Rule.ExploratoryRedirect]
Priority=5
Keywords=random,interesting,surprise,cool,fun
MinKeywordMatches=1
PatternRegex=(?i)\b(random|interesting|surprise|cool|fun|explore)\b.*\b(thing|feature|stuff|something)\b
ForceResponse=Try exploring specific areas:\n- /rules list - see what you can query\n- "list the classes in <file>"\n- "what functions are in <file>?"\n- "explain <ClassName> in detail"

[Rule.ExploratoryGrounded]
Priority=5
Keywords=random,interesting,surprise,cool,fun
MinKeywordMatches=1
PatternRegex=(?i)\b(random|interesting|surprise|cool|fun|explore)\b
SystemSuffix=CRITICAL: Your response must ONLY mention classes, functions, and features that appear verbatim in the context above. Do NOT mention frameworks, databases, or technologies not explicitly named in the context. Do NOT invent features.

[Rule.ExploratoryDiscover]
Priority=5
Keywords=random,interesting,surprise,cool,fun,explore
MinKeywordMatches=1
PatternRegex=(?i)\b(random|interesting|surprise|cool|fun|explore)\b
RandomSample=10
SystemSuffix=Pick the single most interesting or unusual item from the context. Name the exact class or function. Explain what it does and why a developer might find it useful. Do NOT mention anything not present in the context.


; =========================================================================
; CLASS / TYPE LISTING RULES
; =========================================================================
; ScanPattern covers:
;   Pascal/Delphi:   TFoo = class / TFoo = record / IFoo = interface
;   C# / Java:       class Foo / interface IFoo / struct Foo / enum Foo
;   JS/TS:           class Foo
;   C / C++:         class Foo / struct Foo / enum Foo
;   VB:              Class Foo / Module Foo
; =========================================================================
[Rule.ListClassesDetailed]
Priority=5
Keywords=classes,types,structs,records
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?\b(list|show|enumerate|find)\b.*\b(class|type|struct|record).*\b(detail|declar|inherit|full|with|complete|sub|parent)
ScopeCaptureGroup=1
ScanPattern=\b(?:class|struct|interface|enum|module)\s+(\w+)\b|\b(\w+(?:<[^>]+>)?)\s*=\s*(?:class|record|interface|object)\b(?!\s+of\b)
ScanLabel=Classes/Types
ScanPrompt=For each type, show its complete declaration line including parent class/interface and any implemented interfaces or constraints. Note the language construct (class, struct, record, interface, enum).

[Rule.ListClasses]
Priority=10
Keywords=classes,types,structs,records
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?\b(list|show|enumerate|find)\b.*\b(class|type|struct|record)
ScopeCaptureGroup=1
ScanPattern=\b(?:class|struct|interface|enum|module)\s+(\w+)\b|\b(\w+(?:<[^>]+>)?)\s*=\s*(?:class|record|interface|object)\b(?!\s+of\b)
ScanLabel=Classes/Types


; =========================================================================
; INTERFACE LISTING RULES
; =========================================================================
[Rule.ListInterfacesDetailed]
Priority=5
Keywords=interfaces
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|cs|java))\b)?\b(list|show|enumerate|find)\b.*\binterface.*\b(detail|declar|inherit|full|with|complete|parent)
ScopeCaptureGroup=1
ScanPattern=\b(?:interface|protocol|trait)\s+(\w+)\b|\b(\w+(?:<[^>]+>)?)\s*=\s*interface\b(?!\s*$)
ScanLabel=Interfaces
ScanPrompt=For each interface, show its complete declaration including parent interface(s) and any type parameters.

[Rule.ListInterfaces]
Priority=10
Keywords=interfaces
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|cs|java))\b)?\b(list|show|enumerate|find)\b.*\binterface
ScopeCaptureGroup=1
ScanPattern=\b(?:interface|protocol|trait)\s+(\w+)\b|\b(\w+(?:<[^>]+>)?)\s*=\s*interface\b(?!\s*$)
ScanLabel=Interfaces


; =========================================================================
; FUNCTION / METHOD LISTING RULES
; =========================================================================
; ScanPattern covers:
;   Pascal:    function/procedure Foo / TClass.Foo
;   C-style:   returnType funcName(  (heuristic)
;   JS/TS:     function foo / const foo = () =>
;   VB/Basic:  Function Foo / Sub Foo
; =========================================================================
[Rule.ListFunctionsDetailed]
Priority=5
Keywords=functions,procedures,methods,subs,subroutines
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?\b(list|show|enumerate|find)\b.*\b(function|procedure|method|sub).*\b(detail|declar|param|arg|full|with|complete|signature)
ScopeCaptureGroup=1
ScanPattern=\b(?:function|procedure|sub|def)\s+([\w.]+)\s*[\(;:]|(?:public|private|protected|internal|static|async|override|virtual)\s+(?:\w+\s+){0,2}(\w+)\s*\(
ScanLabel=Functions/Methods
ScanPrompt=For each function or method, show its complete signature including parameters, return type, and visibility modifier. If it belongs to a class, note which class.

[Rule.ListFunctions]
Priority=10
Keywords=functions,procedures,methods,subs
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?\b(list|show|enumerate|find)\b.*\b(function|procedure|method|sub)
ScopeCaptureGroup=1
ScanPattern=\b(?:function|procedure|sub|def)\s+([\w.]+)\s*[\(;:]
ScanLabel=Functions/Methods


; =========================================================================
; FEATURE LISTING RULES (doc/prose - LLM extraction, no regex scan)
; =========================================================================
[Rule.ListFeaturesDetailed]
Priority=45
Keywords=features,capabilities
MinKeywordMatches=2
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs|txt|md))\b)?\b(list|show|enumerate)\b.*\b(feature|capabilit).*\b(detail|descri|full|with|explain)
ScopeCaptureGroup=1
ScanLabel=Features
ScanPrompt=For each feature, provide a one-sentence description of what it does and when to use it.

[Rule.ListFeatures]
Priority=50
Keywords=features,capabilities
MinKeywordMatches=2
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs|txt|md))\b)?\b(list|show|enumerate)\b.*\b(feature|capabilit)
ScopeCaptureGroup=1
ScanLabel=Features


; =========================================================================
; STRUCTURAL CODE QUESTIONS - code agent live source inspection
; =========================================================================
; Routes to the code agent for live structural analysis.
; Captures an optional filename for scoped inspection.
; =========================================================================
[Rule.struct_code_count]
Priority=85
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?(how many|count|number)\b.*\b(class|struct|method|function|procedure|type|record|interface|sub)
ScopeCaptureGroup=1
UseCodeAgent=1
CodeToolHints=code_analyze
SkipRetrieval=-1
InjectAnchors=0
DirectToolAnswer=0

[Rule.struct_code_list]
Priority=87
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?(list|show|enumerate|what)\b.*\b(class|struct|method|function|procedure|type|record|interface)
ScopeCaptureGroup=1
UseCodeAgent=1
CodeToolHints=code_analyze
SkipRetrieval=-1
InjectAnchors=0
DirectToolAnswer=0

[Rule.struct_code_explain]
Priority=90
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?(explain|describe|purpose|what does)\b.*\b(class|struct|method|function|procedure|type|record|interface)
ScopeCaptureGroup=1
UseCodeAgent=1
CodeToolHints=code_analyze
SkipRetrieval=-1
InjectAnchors=0
DirectToolAnswer=0

[Rule.struct_code_questions]
Priority=100
PatternRegex=(?i)(?=.*\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b)?\b(classes|structs|methods|functions|procedures|types|records|interfaces|subs)\b
ScopeCaptureGroup=1
UseCodeAgent=1
CodeToolHints=code_analyze
SkipRetrieval=-1
InjectAnchors=0
DirectToolAnswer=0


; =========================================================================
; RULE: UploadedDocScope - Text/document files from the upload store
; =========================================================================
; Catches references to text, markdown, PDF, CSV, JSON, XML, HTML, log,
; config, and YAML files. These may live in the per-session upload store,
; so they need fact_lookup + agent to trigger supplemental search.
; =========================================================================
[Rule.UploadedDocScope]
Priority=105
Enabled=1
PatternRegex=\b(\w+\.(?:txt|md|markdown|pdf|csv|json|jsonl|xml|html|htm|log|ini|cfg|toml|yaml|yml|rst|tex))\b
ScopeCaptureGroup=1
ForceIntent=fact_lookup
InjectAnchors=1
UseHyDE=0
ExpandQuery=0
TopKOverride=15
UseUploadAgent=1


; =========================================================================
; RULE: CodeFileScope - Catch-all for code file mentions
; =========================================================================
; Safety net for any supported code file not caught by specific rules.
; =========================================================================
[Rule.CodeFileScope]
Priority=108
Enabled=1
PatternRegex=\b(\w+\.(?:pas|dpr|inc|pp|js|ts|jsx|tsx|mjs|cs|cpp|cxx|cc|hpp|hxx|c|h|bas|vb|vbs))\b
ScopeCaptureGroup=1
ForceIntent=fact_lookup
InjectAnchors=1
UseUploadAgent=1


; =========================================================================
; RULE: FileScopeGeneric - Catch-all for any filename.ext pattern
; =========================================================================
; Final safety net: if nothing else matched but the user mentioned any
; file by name, scope to it and treat as a local knowledge query.
; =========================================================================
[Rule.FileScopeGeneric]
Priority=110
Enabled=1
PatternRegex=\b(\w+\.[a-zA-Z0-9]{1,6})\b
ScopeCaptureGroup=1
ForceIntent=fact_lookup
UseUploadAgent=1
InjectAnchors=1


; =========================================================================
; RULE: FileScopeCapture - Fallback for anchor injection
; =========================================================================
; Very low priority - runs only if nothing else matched.
; Does NOT override intent - lets the router decide. Only sets
; InjectAnchors as a fallback behavior.
; =========================================================================
[Rule.FileScopeCapture]
Priority=200
Enabled=1
PatternRegex=
InjectAnchors=-1


; =========================================================================
; RULE: image_generation - Image generation requests
; =========================================================================
; Disabled by default - the LLM router handles image generation requests
; naturally in any language. Enable this rule only if you want regex-based
; detection as a fallback.
; =========================================================================
[Rule.image_generation]
Priority=500
Enabled=0
Keywords=generate,create,make,draw,image,picture,photo,illustration,artwork,render
MinKeywordMatches=2
PatternRegex=(?i)(generate|create|make|draw|render).*(image|picture|photo|illustration|artwork)
CustomIntent=image_generation
UseCodeAgent=0
UseHyDE=0
ExpandQuery=0
SkipRetrieval=1


; =========================================================================
; ROUTER EXTENSIONS - Custom intents and output keys
; =========================================================================
; Define custom intents that the LLM router can classify queries into,
; beyond its built-in intent set. Also define custom output keys that
; the router extracts from each query.
;
; Custom Intents:
;   Name        - Unique identifier for the intent
;   Description - Text shown to the router to help it classify queries.
;                 Be specific about when this intent should trigger.
;   MapTo       - Built-in intent to map to (for pipeline behavior)
;   MapToCustom - Custom intent name (for rule matching via CustomIntent)
;
; Custom Keys:
;   Name        - Key name (appears in router output)
;   Description - Possible values and what they mean
;   Guideline   - Instruction for the router on how to detect this key
; =========================================================================
[RouterExtensions]

IntentCount=4

; Joke/humor detection
Intent.1.Name=joke_response
Intent.1.Description=User is telling a joke, asking for humor, or making a lighthearted comment
Intent.1.MapTo=conversational
Intent.1.MapToCustom=joke

; Off-topic detection
Intent.2.Name=off_topic
Intent.2.Description=Question is completely unrelated to programming or the knowledge base
Intent.2.MapTo=conversational
Intent.2.MapToCustom=off_topic

; Image generation detection
Intent.3.Name=image_generation
Intent.3.Description=User wants to generate, create, or make a picture, image, photo, or artwork using AI image generation (Stable Diffusion, FLUX, DALL-E style). Trigger words: generate image, create image, make image, draw, paint, picture of, photo of, image of. NOT for code-based graphics like SVG, HTML canvas, or CSS art - those should use code generation.
Intent.3.MapToCustom=image_generation

; Self-identity detection
Intent.4.Name=self_identity
Intent.4.Description=User is asking about theMIMER (MIMER) assistant itself - its name, identity, or what theMIMER is (e.g. who are you, what is themimer, introduce yourself, what can you do). NOT for questions about frameworks or other software.
Intent.4.MapTo=conversational
Intent.4.MapToCustom=self_identity

; Custom output keys
KeyCount=1

; Mood detection
Key.1.Name=MOOD
Key.1.Description=happy/neutral/frustrated/confused
Key.1.Guideline=Detect the user's emotional tone from their message
