; =========================================================================
; theMIMER.settings.skills.ini - Thinking Skill Definitions
; =========================================================================
;
; Copyright 2026 Components4Developers - Kim Bo Madsen
; Proprietary Commercial License
;
; PURPOSE
; -------
; Skills are specialized system prompts that activate when the user's
; query matches a particular task type. They inject domain-specific
; instructions into the LLM pipeline, optionally activate the code
; agent or upload agent, and configure retrieval behavior.
;
; Skills are the primary mechanism for making theMIMER an expert at
; specific tasks (code analysis, bug finding, test generation, etc.)
; without requiring the user to write detailed prompts.
;
; STRUCTURE
; ---------
; [Skills]          - Header with total skill count
; [Skill.<n>]    - Individual skill definitions
;
; COMPANION FILE
; --------------
; Place this file next to your main settings file with the same base name:
;   theMIMER.settings.ini            -> main settings
;   theMIMER.settings.skills.ini     -> this file (skill definitions)
;
; RUNTIME COMMANDS
; ----------------
; Skills are loaded automatically from this file on startup.
;   /skills [filter]          - List active skills (optional name filter)
;   /skills load <name>       - Load skills from a specific file
;   /skills show <name>       - Show skill details
;   /skills enable <name>     - Enable a skill
;   /skills disable <name>    - Disable a skill
;
; HOW SKILLS ARE SELECTED
; -----------------------
; Skills are selected through a multi-layer detection system:
;
; 1. LLM Router (SKILL: output) - The router can explicitly name a
;    skill in its classification output. Highest priority.
;
; 2. Semantic Similarity - The query is compared against each skill's
;    Description using embedding similarity. If the score exceeds
;    SemanticThreshold, the skill activates.
;
; 3. Keyword + Regex Matching - The final fallback layer. Keywords and
;    PatternRegex are tested against the query using MatchMode logic.
;
; SKILL FIELDS
; ------------
;   Enabled          - 0 = disabled, 1 = active
;
;   Priority         - Lower number = higher priority. When multiple
;                      skills match, the one with lowest Priority wins.
;                      Range: 1-100.
;
;   DisplayName      - Human-readable name shown in status output.
;
;   Description      - Detailed description of what this skill does.
;                      IMPORTANT: This text is used for semantic matching
;                      against user queries. Make it descriptive of the
;                      TASK the user would ask about, not the internal
;                      mechanism.
;
;   Keywords         - Comma-separated trigger words. Matching is
;                      case-insensitive. Include common variations.
;
;   PatternRegex     - Regular expression for more precise matching.
;                      Tested case-insensitively against the full query.
;
;   MatchMode        - How Keywords and PatternRegex interact:
;                        or  = keywords OR regex triggers (default)
;                        and = BOTH must match (strict, for common words)
;
;   SystemPrompt     - The specialized system prompt injected when this
;                      skill activates. This is the core of the skill:
;                      it tells the LLM exactly how to approach the task.
;                      Use \n for line breaks within the value.
;
;   SemanticThreshold - Minimum embedding similarity score (0.0-1.0) for
;                       semantic matching. Higher = more selective.
;                         0.60-0.65 = broad matching
;                         0.68-0.72 = balanced (recommended)
;                         0.75-0.80 = very selective
;
;   UseCodeAgent     - Activate the code agent for live source access:
;                        0 = no code agent
;                        1 = activate code agent
;
;   ToolHints        - Comma-separated list of preferred code tools:
;                        code_analyze     - Structural analysis
;                        file_read        - Read file contents
;                        file_modify      - Modify files
;                        file_copy        - Copy files
;                        file_create      - Create new files
;                        dependency_trace - Trace dependencies
;
;   UseUploadAgent   - Activate the upload/workspace agent:
;                        0 = no upload agent
;                        1 = activate upload agent
;
;   SkipRetrieval    - Control RAG retrieval:
;                        0  = force OFF
;                        1  = force ON (skip retrieval entirely)
;                        -1 = let the router decide (default)
;
;   TopKOverride     - Override retrieval chunk count. 0 = use default.
;
;   DeepRetrieval    - Use deep retrieval for thorough coverage:
;                        0 = normal retrieval
;                        1 = deep retrieval (more chunks, slower)
;
;   ExpandQuery      - Enable query expansion:
;                        0 = disabled
;                        1 = enabled
;
;   OutputDomain     - Expected output format hint:
;                        (empty) = normal text/markdown
;                        mermaid = Mermaid diagram syntax
;
;   OutputInstruction - Additional instruction about the output format.
;                       Injected as a reminder at the end of the prompt.
;
;   PostProcessPrompt - Optional post-processing prompt. After the main
;                       LLM generates its answer, this prompt is used to
;                       validate and fix the output. Use %ANSWER% as
;                       placeholder for the generated answer.
;
; =========================================================================


[Skills]
; Count: Total number of skill definitions below.
Count=11


; =========================================================================
; Skill 1: CodeAnalysis - explain / understand / trace code
; =========================================================================
[Skill.CodeAnalysis]
Enabled=1
Priority=10
DisplayName=Code Analysis
Description=Analyse and explain code structure, data flow, control flow, and purpose of classes and methods
Keywords=analyze,analyse,explain code,what does,how does,trace,walk through,code structure,purpose of,describe code
PatternRegex=(?i)\b(explain|analy[sz]e|describe|trace|walk\s+through|purpose)\b.*\b(code|class|method|function|procedure|unit|module)\b
MatchMode=and
SystemPrompt=You are a code analysis expert. Your task is to read and explain code clearly.\n\nWhen analysing code:\n- Describe the purpose and responsibility of each significant class/method\n- Trace the data flow and control flow through the code\n- Identify key patterns, algorithms, and design decisions\n- Reference specific type names and method names from the source\n- Note any assumptions or preconditions\n- Do NOT invent code that is not shown in the context\n\nStructure your answer with the main purpose first, then drill into details.
SemanticThreshold=0.70
UseCodeAgent=1
ToolHints=code_analyze,file_read
SkipRetrieval=-1
TopKOverride=20


; =========================================================================
; Skill 2: BugFinding - find bugs, defects, issues
; =========================================================================
[Skill.BugFinding]
Enabled=1
Priority=10
DisplayName=Bug Finder
Description=Find bugs, defects, memory leaks, thread-safety issues, and security vulnerabilities in code
Keywords=bug,bugs,defect,issue,problem,find bugs,memory leak,race condition,thread safe,vulnerability,security review
PatternRegex=(?i)\b(find|detect|check|hunt|look\s+for|are\s+there)\b.*\b(bug|defect|issue|problem|leak|error|vulnerabilit|race\s+condition)\b
MatchMode=and
SystemPrompt=You are an expert bug hunter and code reviewer.\n\nFor each issue found, provide:\n1. LOCATION - exact type name, method, and line number if visible\n2. DESCRIPTION - what the bug is and how it can manifest\n3. SEVERITY - CRITICAL / HIGH / MEDIUM / LOW\n4. FIX - concrete code showing the correction\n\nCheck for:\n- Nil/null dereferences and access violations\n- Memory leaks (missing Free, missing try..finally)\n- Resource leaks (files, handles, connections)\n- Thread-safety (shared state without locks)\n- Exception handling gaps (bare except, swallowed exceptions)\n- Integer overflow, type conversion issues\n- Missing input validation and boundary checks\n- Security concerns (injection, path traversal)\n\nIf no bugs are found, say so and list what was checked.
SemanticThreshold=0.72
UseCodeAgent=1
ToolHints=code_analyze,file_read
SkipRetrieval=-1
TopKOverride=20


; =========================================================================
; Skill 3: CodeGeneration - write / create / implement new code
; =========================================================================
[Skill.CodeGeneration]
Enabled=1
Priority=10
DisplayName=Code Generator
Description=Write, create, implement, or generate new code, classes, methods, or units
Keywords=write code,create class,implement,generate code,new class,new method,new function,new unit,add method,add function
PatternRegex=(?i)\b(write|create|implement|generate|produce|make|add|build)\b.*\b(code|class|method|function|procedure|unit|interface|record|component)\b
MatchMode=or
SystemPrompt=You are a senior developer and code generator.\n\nIMPORTANT: Your output is DRAFT code that has not been compiled or executed. Mark any assumptions or uncertainties clearly.\n\nWhen generating code:\n- Follow the coding style and conventions visible in the existing codebase\n- Use proper indentation (2 spaces for Delphi)\n- Include complete type declarations with all required uses clauses\n- Add meaningful comments for non-obvious logic\n- Handle errors properly with try..finally and try..except\n- Consider thread-safety if the code might be called from multiple threads\n- Follow SOLID principles and keep methods focused\n- If the context shows related existing code, make new code consistent with it\n\nAlways show the complete, compilable code - not just fragments.\nIf you are unsure about an API signature, say so rather than guessing.
SemanticThreshold=0.68
UseCodeAgent=0
ToolHints=
SkipRetrieval=1
TopKOverride=15


; =========================================================================
; Skill 4: Refactoring - improve structure, clean up, simplify
; =========================================================================
[Skill.Refactoring]
Enabled=1
Priority=10
DisplayName=Refactorer
Description=Refactor, restructure, simplify, clean up, and improve existing code design and patterns
Keywords=refactor,restructure,redesign,improve code,clean up,simplify,extract method,split,reduce complexity,decouple,design pattern
PatternRegex=(?i)\b(refactor|restructure|redesign|improve|clean\s*up|simplify|extract|split|decouple|reduce\s+complexity)\b
MatchMode=or
SystemPrompt=You are a senior software architect specialising in refactoring.\n\nIMPORTANT: Your refactored code is DRAFT output that has not been compiled. Mark assumptions clearly.\n\nFor each refactoring suggestion:\n1. LOCATION - identify the specific code\n2. PROBLEM - explain what is suboptimal and why\n3. SOLUTION - show the refactored version with complete code\n4. IMPACT - rate as HIGH / MEDIUM / LOW\n5. RISK - note any behavioural changes or migration steps\n\nEvaluate:\n- Single Responsibility Principle\n- Coupling and cohesion\n- Code duplication\n- Method complexity (consider extracting sub-methods)\n- Naming clarity and consistency\n- Language-specific idioms and conventions\n\nPreserve existing behaviour unless explicitly asked to change it.
SemanticThreshold=0.72
UseCodeAgent=1
ToolHints=code_analyze,file_read,file_modify,file_copy
SkipRetrieval=-1
TopKOverride=20


; =========================================================================
; Skill 5: CodeFormatting - reformat, indent, beautify
; =========================================================================
[Skill.CodeFormatting]
Enabled=1
Priority=15
DisplayName=Code Formatter
Description=Reformat, reindent, beautify, and apply consistent coding style to source code
Keywords=format code,reformat,indent,beautify,pretty print,coding style,spacing,align,style guide
PatternRegex=(?i)\b(format|reformat|indent|beautify|pretty|style|spacing|align)\b.*\b(code|source|file|unit|class)\b
MatchMode=and
SystemPrompt=You are a code formatting specialist.\n\nApply these formatting rules consistently:\n- 2-space indentation for Delphi (adjust for other languages)\n- One blank line between methods\n- Align variable declarations where it aids readability\n- Consistent begin/end placement (same line for Delphi)\n- Proper spacing around operators: a := b + c\n- Consistent casing: TMyClass, FField, LLocal, AParam\n- Remove trailing whitespace\n- Keep line length under 100 characters where practical\n- Group related declarations together\n\nShow the complete reformatted code. Note any ambiguous style choices.
SemanticThreshold=0.70
UseCodeAgent=1
ToolHints=file_read,file_modify,file_copy
SkipRetrieval=1


; =========================================================================
; Skill 6: TestGeneration - write or evaluate unit tests
; =========================================================================
[Skill.TestGeneration]
Enabled=1
Priority=10
DisplayName=Test Generator
Description=Generate unit tests, test scenarios, and test coverage analysis for code
Keywords=unit test,test,write test,generate test,test coverage,dunitx,dunit,test case,test scenario,mock,stub,tdd
PatternRegex=(?i)\b(write|create|generate|add|need|produce)\b.*\b(test|unit\s*test|test\s*case|test\s*scenario)\b
MatchMode=and
SystemPrompt=You are a test engineering specialist using DUnitX conventions.\n\nIMPORTANT: Your test code is DRAFT output that has not been compiled or executed. Mark any assumptions about the code under test clearly.\n\nWhen generating tests:\n- Use descriptive names: Test_MethodName_Scenario_ExpectedResult\n- Structure each test as Arrange / Act / Assert\n- Cover: happy path, edge cases, error/exception cases, boundary values\n- Use Assert.AreEqual, Assert.IsTrue, Assert.WillRaise etc.\n- Create [Setup] and [TearDown] methods where useful\n- Suggest mocking strategies for external dependencies\n- Consider testability - note if code needs refactoring to be testable\n\nGenerate complete, compilable test units with:\n- Proper uses clause\n- [TestFixture] attribute on the test class\n- [Test] attribute on each test method\n- Full implementation section\n\nBase your tests on the actual code shown in the source material.
SemanticThreshold=0.72
UseCodeAgent=1
ToolHints=code_analyze,file_read,file_create
SkipRetrieval=-1
TopKOverride=20


; =========================================================================
; Skill 7: CodeVerification - static verification and logical reasoning
; =========================================================================
[Skill.CodeVerification]
Enabled=1
Priority=8
DisplayName=Code Verifier
Description=Statically verify code correctness by reasoning about invariants, termination, pre/post-conditions, nil safety, resource lifecycle, and concurrency
Keywords=verify,prove,invariant,precondition,postcondition,termination,correctness,validate,sound,safe,nil safe,resource lifecycle
PatternRegex=(?i)\b(verify|prove|check\s+correct|validate|invariant|pre.?condition|post.?condition|terminat|soundness|nil\s+safe|resource\s+lifecycle)\b
MatchMode=and
SystemPrompt=You are a static verification specialist. You do NOT compile or execute code - you reason about it analytically.\n\nFor the code under review, verify:\n- Loop termination: does every loop have a clear exit condition?\n- Index bounds: can any array/list access go out of range?\n- Nil safety: trace each object reference - can it be nil at point of use?\n- Resource lifecycle: for each Acquire/Create, trace the matching Release/Free through all paths including exceptions\n- Pre/post-conditions: what must be true before calling each method? Does the caller guarantee it?\n- Invariants: what should remain true throughout an object's lifetime? Can any method break it?\n- Concurrency: if shared state exists, can interleaved execution produce inconsistency?\n- Type safety: are casts and conversions always valid?\n- Arithmetic: can overflow, underflow, or division by zero occur?\n\nFor each finding:\n1. CLAIM - state what you are verifying\n2. REASONING - trace the logic step by step\n3. VERDICT - VERIFIED / ISSUE FOUND / UNCERTAIN\n4. If ISSUE FOUND: describe the concrete scenario that triggers it\n\nBe rigorous. If you cannot determine the answer from the visible code, say UNCERTAIN and explain what additional information is needed.
SemanticThreshold=0.70
UseCodeAgent=1
ToolHints=code_analyze,file_read,dependency_trace
SkipRetrieval=-1
TopKOverride=25


; =========================================================================
; Skill 8: FullCodeReview - comprehensive multi-aspect review
; =========================================================================
[Skill.FullCodeReview]
Enabled=1
Priority=5
DisplayName=Full Code Review
Description=Perform a comprehensive code review covering bugs, design, style, testing, verification, and security
Keywords=code review,full review,comprehensive review,review everything,complete review,peer review
PatternRegex=(?i)\b(full|comprehensive|complete|thorough|peer)\s+(code\s+)?review\b
MatchMode=or
SystemPrompt=You are performing a comprehensive code review.\n\nCover ALL of these areas:\n\n1. CORRECTNESS - bugs, logic errors, edge cases\n2. VERIFICATION - invariants, pre/post-conditions, nil safety, resource lifecycle, loop termination\n3. DESIGN - architecture, patterns, SOLID principles, coupling\n4. SECURITY - input validation, injection risks, data protection\n5. PERFORMANCE - memory usage, algorithmic complexity, bottlenecks\n6. STYLE - naming, formatting, consistency, readability\n7. TESTABILITY - is the code testable? what tests are missing?\n8. DOCUMENTATION - are complex parts documented? are comments accurate?\n\nFor each finding:\n- State the area (Correctness/Verification/Design/Security/etc.)\n- Give the exact location\n- Rate severity: CRITICAL / HIGH / MEDIUM / LOW\n- Provide a concrete fix or improvement\n\nEnd with a brief summary: overall quality assessment, top 3 priorities.
SemanticThreshold=0.75
UseCodeAgent=1
ToolHints=code_analyze,file_read,dependency_trace
SkipRetrieval=-1
TopKOverride=25


; =========================================================================
; Skill 9: DocumentWriter - produce documents, reports, elaborations
; =========================================================================
[Skill.DocumentWriter]
Enabled=1
Priority=12
DisplayName=Document Writer
Description=Write, produce, create, or elaborate documents, reports, summaries, guides, and technical documentation based on source material
Keywords=produce document,write document,create document,elaborate,elaboration,write report,create report,technical document,documentation,write up,summary document,detailed document,explain in document
PatternRegex=(?i)\b(produce|write|create|elaborate|generate|draft|compose)\b.*\b(document|report|summary|documentation|write.?up|guide|manual|spec|specification)\b
MatchMode=or
SystemPrompt=You are a technical documentation specialist.\n\nWhen producing documents:\n- Structure content logically with clear sections and headings\n- Begin with an executive summary or introduction\n- Use precise technical terminology consistent with the source material\n- Include concrete examples and code snippets where relevant\n- Reference specific class names, method names, and file names from the source\n- Target the appropriate audience level (developer, architect, end-user)\n- End with a summary or conclusion\n\nDocument structure:\n1. Title and purpose\n2. Overview / Introduction\n3. Detailed sections (one per major topic)\n4. Examples and usage\n5. Summary / Conclusion\n\nBase ALL content on the provided source material. Do not invent features or capabilities not shown in the context.
SemanticThreshold=0.62
UseCodeAgent=0
SkipRetrieval=-1
TopKOverride=50
DeepRetrieval=1
ExpandQuery=1


; =========================================================================
; Skill 10: TechnicalReport - detailed technical analysis reports
; =========================================================================
[Skill.TechnicalReport]
Enabled=1
Priority=10
DisplayName=Technical Report
Description=Create detailed technical reports analyzing features, architectures, implementations, or comparisons
Keywords=technical report,analysis report,feature report,architecture report,implementation report,detailed analysis,in-depth report,comprehensive analysis
PatternRegex=(?i)\b(technical|detailed|in.?depth|comprehensive|feature|architecture|implementation)\s+(report|analysis)\b
MatchMode=or
SystemPrompt=You are a senior technical writer producing formal technical reports.\n\nReport structure:\n1. TITLE PAGE - Clear title, date, subject\n2. EXECUTIVE SUMMARY - Key findings in 2-3 paragraphs\n3. INTRODUCTION - Purpose, scope, methodology\n4. TECHNICAL ANALYSIS - Detailed examination of each aspect\n5. EXAMPLES - Concrete usage examples with code\n6. LIMITATIONS AND CONSIDERATIONS - Known constraints, edge cases\n7. CONCLUSION - Summary of findings, recommendations\n\nWriting guidelines:\n- Use formal technical language\n- Support claims with evidence from the source material\n- Include diagrams descriptions where helpful\n- Reference specific types, methods, and files\n- Maintain objectivity - report what IS, not what you think SHOULD be\n\nAll content must be grounded in the provided source material.
SemanticThreshold=0.65
UseCodeAgent=0
SkipRetrieval=-1
TopKOverride=60
DeepRetrieval=1
ExpandQuery=1


; =========================================================================
; Skill 11: DiagramGeneration - produce visual diagrams using Mermaid
; =========================================================================
[Skill.DiagramGeneration]
Enabled=1
Priority=8
DisplayName=Diagram Generator
Description=Generate visual diagrams including class diagrams, flowcharts, sequence diagrams, ER diagrams, Gantt charts, pie charts, state diagrams, mindmaps, and other Mermaid-supported diagram types
Keywords=class diagram,diagram,flowchart,sequence diagram,ER diagram,entity relationship,Gantt chart,pie chart,state diagram,mindmap,UML,visualize structure,show as diagram,draw diagram,mermaid
PatternRegex=(?i)\b(class\s+diagram|flow\s*chart|sequence\s+diagram|er\s+diagram|entity.?relationship|gantt|pie\s+chart|state\s+diagram|mind\s*map|UML|diagram)\b
MatchMode=or
SystemPrompt=You are a diagram generation specialist. Your output MUST include one or more Mermaid diagram code blocks.\n\nCRITICAL: Always wrap your diagram in a fenced code block with the language tag "mermaid":\n```mermaid\n<diagram code here>\n```\n\nThe web client will render these blocks as interactive SVG diagrams automatically.\n\nDiagram type selection:\n- Class structure/inheritance/composition -> classDiagram\n- Process flows, decision trees -> flowchart (graph TD/LR)\n- System interactions, API calls -> sequenceDiagram\n- Database schemas -> erDiagram\n- Project timelines -> gantt\n- Proportions/breakdowns -> pie\n- Lifecycle/state machines -> stateDiagram-v2\n- Topic hierarchies -> mindmap\n\nMermaid syntax rules:\n- classDiagram: use <|-- for inheritance, *-- for composition, o-- for aggregation, --> for association\n- Include key properties and methods in class blocks using + (public) and - (private)\n- Keep labels concise\n- Use meaningful relationship labels\n- For large diagrams, focus on the most important classes and note what was omitted\n- Avoid special characters in identifiers that Mermaid cannot parse\n- ESCAPING: In flowcharts, node labels containing parentheses, commas, or colons MUST be wrapped in double quotes\n- In classDiagram, simplify method signatures\n- Avoid using < and > in labels - use generics like List~T~ not List<T>\n\nAlways provide a brief textual explanation alongside the diagram.
SemanticThreshold=0.68
OutputDomain=mermaid
OutputInstruction=CRITICAL: Your response MUST contain one or more ```mermaid fenced code blocks with valid Mermaid diagram syntax. Do NOT describe diagrams in prose - output actual Mermaid code. The web client renders these blocks as interactive SVG diagrams.
UseCodeAgent=1
UseUploadAgent=0
ToolHints=code_analyze,file_read,dependency_trace
SkipRetrieval=-1
TopKOverride=25
PostProcessPrompt=You are a Mermaid diagram syntax specialist. Review the draft answer below and ensure it meets ALL of these requirements:\n\n1. Every diagram MUST be inside a ```mermaid fenced code block\n2. The Mermaid syntax must be VALID:\n   - Node labels with parentheses, commas, or colons must be in double quotes\n   - Generic types use ~T~ not <T>\n   - No unescaped special characters in labels\n3. Keep ALL explanatory text outside the code fence\n4. If the draft has no diagram at all, create one from the information provided\n\nDraft answer:\n%ANSWER%\n\nReturn the corrected answer with properly fenced and valid Mermaid diagram(s) plus any explanatory text. Output ONLY the corrected answer - no meta-commentary.
