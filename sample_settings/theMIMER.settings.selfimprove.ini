; PURPOSE
; -------
; The self-improvement system continuously tests MIMER against synthesized
; (and/or human-provided) prompts, evaluates response quality, identifies
; weaknesses, and can automatically generate new skills to address gaps.
;
; It operates in a loop:
;   1. Generate or receive test prompts
;   2. Run each prompt through the full MIMER pipeline
;   3. Evaluate the response (relevance, grounding, completeness)
;   4. Detect patterns in failures (skill gaps vs. data gaps)
;   5. Optionally generate skill proposals to fix skill gaps
;   6. Repeat with focus on previously failed prompts
;
; KEY CONCEPT: Skill Gaps vs Data Gaps
; -------------------------------------
;   SKILL GAP: RAG context was sufficient but the answer was poor.
;     -> FIX: Generate a skill to improve prompting/response quality.
;
;   DATA GAP: RAG context was insufficient to answer the question.
;     -> FIX: Ingest more documentation into the knowledge base.
;             Do NOT generate a skill (the knowledge is missing, not
;             the reasoning ability).
;
; COMPANION FILE
; --------------
; Place next to your main settings file:
;   theMIMER.settings.ini               -> main settings
;   theMIMER.settings.selfimprove.ini   -> this file
;
; RUNTIME COMMANDS
; ----------------
;   /selfimprove start [mode]  - Begin improvement loop
;                                Modes: human, synthetic, both
;   /selfimprove stop          - Pause (state is persisted)
;   /selfimprove status        - Show current statistics
;   /selfimprove report        - Generate markdown report
;   /selfimprove feedback      - Process pending feedback now (one-shot)
;   /selfimprove instructions  - Show instruction store stats
;   /selfimprove prompts       - Show prompt store summary
;   /selfimprove patterns      - Show all accumulated patterns
;   /selfimprove skillgaps     - Show skill gaps (need better prompting)
;   /selfimprove datagaps      - Show data gaps (need RAG ingestion)
;   /selfimprove generate      - Generate skill proposals from gaps
;   /selfimprove skills        - Show generated/modified skills
;   /selfimprove cleanup       - Revalidate and cleanup prompts
;   /selfimprove verbose N     - Set verbosity (0-2)
;   /selfimprove quiet         - Decrease verbosity
;
; REQUIREMENTS
; ------------
; - An external provider (Gemini, Claude, OpenAI) with pcEvaluateSelfImprove
;   capability is strongly recommended for objective evaluation.
; - The main MIMER pipeline must be operational (embedding model loaded,
;   knowledge base ingested, at least one chat model available).
; - Web search (UseWebSearch=1) requires internet access.
;
; =========================================================================


[SelfImprove]
; Enabled: Master switch for the self-improvement system.
;   0 = disabled (all /selfimprove commands are no-ops)
;   1 = enabled (system is available but does not auto-start)
Enabled=0


; =========================================================================
; Iteration Control
; =========================================================================

; PromptsPerIteration: How many prompts to test per iteration.
; Each prompt results in one full MIMER pipeline execution + evaluation.
;   5-10 = reasonable for local models (GPU time per iteration)
;   20+  = feasible with fast external providers
PromptsPerIteration=10

; ReviewInterval: Pause for human review every N iterations.
; At each checkpoint, a summary is displayed and you can choose to
; continue or stop. Set to 0 to never auto-pause.
ReviewInterval=50

; MaxIterationsPerSession: Maximum iterations before mandatory pause.
; Prevents runaway loops. State is saved, so you can continue later.
;   0 = unlimited
MaxIterationsPerSession=500


; =========================================================================
; Prompt Synthesis
; =========================================================================
; Controls how test prompts are generated. The system creates diverse
; prompts across multiple categories to test different aspects of
; MIMER's capabilities.

; UseWebSearch: Enable web search for prompt ideas.
; When enabled, searches DuckDuckGo HTML for real questions people ask.
; Up to 20% of prompts come from web search.
;   0 = offline only (prompts from RAG content + templates)
;   1 = include web-sourced prompts (requires internet)
UseWebSearch=0

; WebSearchPrefix: Prefix for all web searches (prepended to each topic).
; Set to your primary technology/domain.
; Examples: "Delphi", "Python", "React", "kbmMW"
WebSearchPrefix=Delphi

; WebSearchTopics: Comma-separated list of topics to search for.
; Leave empty to auto-extract topics from RAG sources.
WebSearchTopics=

; PromptMix: Distribution of prompt categories (must sum to 100).
; Adjust these to focus on areas you want to test more.
;
;   SimpleFact     - Simple factual questions ("What is X?")
;   HowTo          - How-to instructions ("How do I use X?")
;   CodeStructural - Code structure questions ("List classes in X")
;   Comparison     - Comparison questions ("X vs Y")
;   Debugging      - Bug finding/debugging scenarios
;   EdgeCase       - Unusual or tricky edge cases
PromptMix.SimpleFact=20
PromptMix.HowTo=25
PromptMix.CodeStructural=20
PromptMix.Comparison=15
PromptMix.Debugging=10
PromptMix.EdgeCase=10


; =========================================================================
; Evaluation
; =========================================================================
; Controls how responses are scored. Each response is evaluated on
; three dimensions, and the weighted sum forms the overall score.

; EvalWeight.Relevance: Does the response address the question?
; Weight range: 0.0-1.0. All three weights must sum to 1.0.
EvalWeight.Relevance=0.4

; EvalWeight.Grounding: Are claims supported by retrieved context?
; High weight penalizes hallucination.
EvalWeight.Grounding=0.4

; EvalWeight.Completeness: Is the answer thorough?
EvalWeight.Completeness=0.2


; =========================================================================
; Gap Detection
; =========================================================================
; Controls when accumulated failures are classified as significant gaps.

; MinEvidenceCount: Minimum failures on a topic before it is considered
; a significant gap. Prevents acting on one-off failures.
MinEvidenceCount=5

; FailureThreshold: Score threshold (0-10) below which a response is
; considered a skill gap candidate. Patterns with MEDIAN score below
; this (and sufficient retrieved context) are classified as skill gaps.
FailureThreshold=5.0

; AutoWriteConfidence: Confidence threshold for auto-generating skills.
; Formula: 0.35*EvidenceStrength + 0.35*Severity + 0.20*Specificity + 0.10*Novelty
; Higher values require more evidence before creating a skill.
;   0.6 = aggressive (generates skills quickly, may produce low-quality ones)
;   0.8 = balanced (recommended)
;   1.0 = disabled (manual review only via /selfimprove generate)
AutoWriteConfidence=0.8


; =========================================================================
; Prompt Store
; =========================================================================
; All generated and received prompts are persisted with their status
; and score history. This enables retry of failed prompts across sessions.

; PromptStorePath: File path for the prompt store (JSON).
PromptStorePath=selfimprove_prompts.json

; HandledThreshold: Score (0-10) above which a prompt is considered
; "handled" (successfully answered). Uses MEDIAN of recent scores.
; This is the static threshold, used when UseDynamicThreshold=0.
HandledThreshold=7.5

; LowQualityThreshold: Score (0-10) below which a prompt is considered
; "low quality" (ambiguous, unanswerable, or poorly formed).
; Low quality prompts are flagged for clarification rather than retry.
LowQualityThreshold=3.0

; MinTestCount: Minimum number of tests before making status decisions.
; Prompts with fewer tests stay in "active" status.
MinTestCount=3

; ReliabilityWindow: Number of recent scores to use for median calculation.
; Higher values = more reliable but slower to respond to improvements.
ReliabilityWindow=5

; MaxRetries: Maximum times to retry a failed prompt before marking it
; as permanently failed.
MaxRetries=5

; RetryFailedFirst: Prioritize retrying failed prompts over generating
; new ones. Each iteration first processes retry prompts, then fills
; remaining slots with newly generated prompts.
;   0 = generate new prompts only
;   1 = retry failed first, then generate new (recommended)
RetryFailedFirst=1


; =========================================================================
; Feedback and Instruction Learning
; =========================================================================
; The feedback system learns from user interactions and self-test results.

; FeedbackMode: Which input streams the improvement loop uses.
;   human     - Only learn from real user feedback (thumbs up/down in webchat)
;   synthetic - Only learn from autonomous proactive prompt testing
;   both      - Use both input streams
; Can be overridden per-session: /selfimprove start human
FeedbackMode=both

; FeedbackPath: Path to the feedback JSON file written by the webchat
; server. Consumed by the teacher analysis when mode is "human" or "both".
FeedbackPath=feedback.json

; TeacherPrompt: Custom teacher prompt template for generating corrective
; instructions. Leave empty to use the built-in default.
; Supports placeholders:
;   %QUERY%              - The original user query
;   %SKILL%              - Active skill name
;   %DOMAIN%             - Detected domain
;   %INTENT%             - Detected intent
;   %COMMENT%            - User's feedback comment
;   %ANSWER%             - The generated answer
;   %FAILURE_MODES%      - Detected failure modes
;   %STEPS%              - Processing steps taken
;   %ACTIVE_INSTRUCTIONS% - Currently active instructions
TeacherPrompt=


; =========================================================================
; Dynamic Threshold (Continuous Improvement)
; =========================================================================
; Instead of a fixed "handled" score, the dynamic threshold rises as
; overall performance improves, ensuring the system always pushes for
; better results.

; UseDynamicThreshold: Enable dynamic threshold.
;   0 = use static HandledThreshold
;   1 = use dynamic threshold that adapts to performance
UseDynamicThreshold=1

; DynamicThresholdMode: How to calculate the dynamic threshold.
;   0 = Percentile: Top X% of scores are "handled", bottom become retry
;   1 = Offset: Threshold = average score - offset
;   2 = Minimum: Use whichever is lower (static or dynamic) - most aggressive
DynamicThresholdMode=0

; DynamicPercentile: For mode 0 - what percentile counts as "handled".
;   80 = top 80% handled, bottom 20% need improvement
DynamicPercentile=80

; DynamicOffset: For mode 1 - how far below average to set threshold.
;   1.0 = threshold = average - 1.0
DynamicOffset=1.0

; MinThreshold: Never go below this even if dynamic calculation is lower.
; Prevents accepting truly poor responses as "handled".
MinThreshold=5.0

; MaxThreshold: Never go above this even if scores are very high.
; Ensures there is always room for improvement.
;   10.0 = disabled (allow threshold to reach maximum)
MaxThreshold=9.5


; =========================================================================
; Skill Generation
; =========================================================================
; Automatic generation of skill files to address detected skill gaps.

; AutoGenerateSkills: Enable automatic skill generation.
; When enabled, skill PROPOSALS are generated every SkillGenerationInterval
; iterations. Use /selfimprove approve to commit pending proposals.
;   0 = manual only (use /selfimprove generate)
;   1 = automatic proposals
AutoGenerateSkills=0

; SkillGenerationInterval: Generate skill proposals every N iterations.
;   0 = only manual via /selfimprove generate
SkillGenerationInterval=5

; SkillOutputPath: Directory for generated skill markdown files.
SkillOutputPath=generated_skills

; SkillBackupPath: Directory for skill backups before modification.
; When enhancing an existing skill, the original is backed up here first.
SkillBackupPath=skill_backups


; =========================================================================
; Persistence
; =========================================================================

; StatePath: File for continuation across sessions.
; Contains accumulated evaluations, patterns, and statistics.
StatePath=selfimprove_state.json

; ReportPath: Directory for generated markdown reports.
ReportPath=selfimprove_reports


; =========================================================================
; Output
; =========================================================================

; ConsoleVerbosity: Console output detail level.
;   0 = minimal (only errors and review checkpoints)
;   1 = normal (iteration summaries)
;   2 = verbose (each prompt and score with context analysis)
ConsoleVerbosity=1


; =========================================================================
; Web Search Settings
; =========================================================================

; WebSearchTimeout: Timeout for web search requests in milliseconds.
WebSearchTimeout=10000

; WebSearchMaxResults: Maximum search results to use for prompt ideas.
WebSearchMaxResults=5


; =========================================================================
; Advanced
; =========================================================================

; EvalMaxContextChars: Maximum context length to include in evaluation
; prompt. Longer contexts are truncated.
;   0 = no limit
EvalMaxContextChars=4000
