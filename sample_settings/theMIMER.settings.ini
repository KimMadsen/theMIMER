; theMIMER.settings.ini - Main Configuration File
; =========================================================================
;
; Copyright 2026 Components4Developers - Kim Bo Madsen
; Proprietary Commercial License
;
; PURPOSE
; -------
; This is the primary configuration file for theMIMER (MIMER Is Mythical
; Enhanced Reasoning). It controls embedding, retrieval, orchestration,
; context handling, sampling, query routing, conversation memory, output,
; file upload, the web chat server, vision, image generation, and
; knowledge source definitions.
;
; LLM models (chat, small/routing, vision, external providers) are
; configured separately in theMIMER_settings_providers.ini.
;
; STRUCTURE
; ---------
; The file is organized into named sections, each controlling a specific
; subsystem. Settings use INI key=value syntax. Boolean values use
; 0 (off) and 1 (on). Float values use a period as decimal separator.
;
; COMPANION FILES
; ---------------
; All files share the same base name (theMIMER_settings) with suffixes:
;
;   theMIMER.settings.ini              - This file (main settings)
;   theMIMER.settings.providers.ini    - LLM provider registry
;   theMIMER.settings.rules.ini        - Query rules and router extensions
;   theMIMER.settings.tools.ini        - External tool definitions
;   theMIMER.settings.skills.ini       - Thinking skill definitions
;   theMIMER.settings.strategies.ini   - Multi-persona thinking strategies
;   theMIMER.settings.selfimprove.ini  - Self-improvement feedback loop
;
; Place all files in the same directory as the theMIMER executable.
;
; PIPELINE ARCHITECTURE: QUERY MODE vs THINKING MODE
; ---------------------------------------------------
; Two settings control the overall intelligence of theMIMER. They are
; independent but interact in a specific way:
;
;   [Query] Mode     - Sets the PIPELINE CEILING: which processing phases
;                      are available for any given query. Each mode is a
;                      superset of the previous one.
;
;   [LLM] Thinking   - Sets the REASONING STRATEGY: how the LLM reasons
;                      about the answer once the pipeline reaches the
;                      thinking phase. Only takes effect when Mode=deep.
;
; Think of Query Mode as "how much machinery is available" and Thinking
; as "how the machinery reasons once engaged."
;
; QUERY MODE HIERARCHY (each includes all features of the modes above it):
;
;   direct     No retrieval, no routing, no tools, no thinking.
;       |      Raw LLM + vision only. Fastest possible response.
;       |      Good for: quick chat, brainstorming, vision-only queries.
;       v
;   retrieval  Adds: RAG retrieval (vector + BM25 search).
;       |      Single LLM call with retrieved context. No router.
;       |      Good for: simple Q&A over your knowledge base.
;       v
;   guided     Adds: LLM router, skills, HyDE, query expansion, refinement.
;       |      The router classifies the query and selects the retrieval
;       |      strategy. Skills inject specialized system prompts.
;       |      Good for: diverse queries needing different approaches.
;       v
;   agentic    Adds: tool use (code agent, upload agent, web search),
;       |      query decomposition into sub-questions.
;       |      Good for: live source analysis, file operations, complex
;       |      multi-part questions.
;       v
;   deep       Adds: multi-persona thinking strategies.
;              This is the ONLY mode where [LLM] Thinking takes effect.
;              Good for: maximum quality analysis, code review, research.
;
; THINKING MODES (only active when Query Mode = deep):
;
;   off        No thinking strategy. Even in deep mode, the LLM answers
;              directly (but still has access to all agentic features).
;
;   critique   Draft-then-critique: the LLM generates an initial answer,
;              then a critic persona reviews it and the answer is refined.
;
;   debate     Multi-persona debate: advocate and critic personas argue
;              different perspectives, then a synthesizer merges them.
;
;   code       Code-specialized personas: architect, implementer, reviewer,
;              and tester analyze the query from different angles.
;
;   auto       Auto-classifier: a small LLM call scores candidate
;              strategies against the query and picks the best one.
;              Configured via [AutoClassifier] section.
;
;   meta       Meta-orchestrator: iteratively selects strategies, executes
;              them, scores the result, and refines until a quality
;              threshold is met or iterations are exhausted.
;              Configured via [MetaThinking] section.
;              This is the most thorough (and most expensive) mode.
;
; INTERACTION EXAMPLES:
;
;   Mode=direct, Thinking=meta
;     -> Thinking is IGNORED. Direct mode has no thinking phase.
;        The LLM answers raw with no retrieval or tools.
;
;   Mode=agentic, Thinking=auto
;     -> Thinking is IGNORED. Agentic mode enables tools and decomposition
;        but does NOT activate thinking strategies. The LLM answers with
;        context from RAG and tools, but without multi-persona reasoning.
;
;   Mode=deep, Thinking=off
;     -> All pipeline phases available (routing, tools, decomposition)
;        but the thinking phase is skipped. Useful when you want agentic
;        features without the overhead of multi-persona reasoning.
;
;   Mode=deep, Thinking=auto
;     -> Full pipeline. The auto-classifier picks the best thinking
;        strategy per query. Fast queries may get "direct" (no thinking),
;        code queries get "code", complex analysis gets "debate", etc.
;
;   Mode=deep, Thinking=meta
;     -> Maximum quality. The meta-orchestrator iterates through
;        strategies, self-critiques, and refines. Most expensive but
;        produces the most thorough answers.
;
; PRACTICAL GUIDANCE:
;
;   Just starting out?       -> Mode=guided, Thinking=off
;   Want tools + code agent? -> Mode=agentic, Thinking=off
;   Want best quality?       -> Mode=deep, Thinking=auto
;   Maximum thoroughness?    -> Mode=deep, Thinking=meta
;   Fastest responses?       -> Mode=direct, Thinking=off
;
; Both settings can be changed at runtime:
;   /mode direct|retrieval|guided|agentic|deep
;   /think off|critique|debate|code|auto|meta
;
; RELOAD
; ------
; Most settings can be reloaded at runtime with /settings reload.
; Some settings (embedding model, server port) require a restart.
;
; =========================================================================


; =========================================================================
; [General] - Global application settings
; =========================================================================
[General]
; AutoSave: Automatically save conversation state on exit.
;   0 = do not auto-save
;   1 = save state on exit
AutoSave=0


; =========================================================================
; [Embedding] - Text embedding model for RAG vector search
; =========================================================================
; The embedding model converts text into dense vectors for similarity
; search. It is used during both ingestion (indexing documents) and
; querying (converting the user's question into a vector).
;
; The model must be a GGUF file compatible with llama.cpp's embedding
; mode. Popular choices:
;   - nomic-embed-text-v1.5-q8_0.gguf  (768-dim, fast, good quality)
;   - bge-base-en-v1.5-q8_0.gguf       (768-dim, English-focused)
;   - mxbai-embed-large-v1-q8_0.gguf   (1024-dim, higher quality)
;
; Prefixes are model-specific. nomic-embed models require:
;   IngestPrefix=search_document:
;   QueryPrefix=search_query:
; Other models may not need prefixes (leave empty).
; =========================================================================
[Embedding]
; Model: GGUF file for text embeddings (required for RAG).
; Place in the same directory as the executable or use a full path.
Model=nomic-embed-text-v1.5-q8_0.gguf

; GPULayers: Number of model layers to offload to GPU.
;   99 = offload all layers (recommended if VRAM allows)
;   0  = CPU only
GPULayers=99

; VectorStore: Filename for the persistent vector database.
; Created automatically on first ingestion. Delete to rebuild.
VectorStore=knowledge.kbvs

; IngestPrefix: Prefix prepended to text during ingestion.
; Model-specific. For nomic-embed: "search_document: " (with trailing space).
; Leave empty for models that do not use task prefixes.
IngestPrefix=search_document: 

; QueryPrefix: Prefix prepended to user queries before embedding.
; Model-specific. For nomic-embed: "search_query: " (with trailing space).
QueryPrefix=search_query: 


; =========================================================================
; [LLM] - Language model behavior settings
; =========================================================================
; [LLM] - Language model behavior settings
; =========================================================================
; Controls the global behavior of LLM inference, including temperature
; and the active thinking strategy.
;
; IMPORTANT: The Thinking setting only takes effect when [Query] Mode=deep.
; In all other modes (direct, retrieval, guided, agentic), the thinking
; strategy is loaded but never invoked. See the "PIPELINE ARCHITECTURE"
; section at the top of this file for a full explanation.
; =========================================================================
[LLM]
; Temperature: Controls randomness of LLM output (0.0 - 2.0).
;   Lower values (0.1-0.4) = more deterministic, better for code/facts
;   Higher values (0.7-1.0) = more creative, better for writing
;   Default: 0.3 (conservative, good for code work)
Temperature=0.3

; Thinking: Active thinking strategy for query processing.
; ONLY ACTIVE when [Query] Mode=deep. Ignored in all other modes.
;
;   off      - No thinking strategy, direct LLM response
;   critique - Single critic reviews the answer
;   debate   - Multiple personas debate the answer
;   code     - Code-specialized multi-persona analysis
;   auto     - Classify each query and select the best strategy
;              (configured via [AutoClassifier] section)
;   meta     - Iterative orchestrator: coordinates multiple strategies,
;              self-critiques, and refines until quality threshold is met
;              (configured via [MetaThinking] section)
;
; Can be changed at runtime: /think auto, /think meta, /think off
Thinking=auto

; Reranker: LLM-based reranking of retrieved chunks.
;   off - No reranking (faster, uses only vector similarity)
;   llm - Use a provider with pcReranking capability to reorder
;         retrieved chunks by relevance (slower but more accurate)
Reranker=llm


; =========================================================================
; [Orchestrator] - Model routing for different query types
; =========================================================================
; The orchestrator decides whether to use the small (fast) model or the
; large (capable) model for different categories of queries. This helps
; balance speed and quality.
; =========================================================================
[Orchestrator]
; UseSmallForConversational: Route casual/conversational queries to the
; small model for faster response.
;   0 = always use large model (recommended for code work)
;   1 = use small model for greetings, small talk, confirmations
UseSmallForConversational=0

; UseSmallForSimpleFacts: Route simple fact lookups to the small model.
;   0 = always use large model
;   1 = use small model for short factual answers
UseSmallForSimpleFacts=0

; SmallFactsMaxChars: Maximum answer length (in characters) for which
; the small model is considered sufficient for fact lookups.
; Only applies when UseSmallForSimpleFacts=1.
SmallFactsMaxChars=2000


; =========================================================================
; [MetaThinking] - Iterative meta-thinking orchestrator
; =========================================================================
; The meta-thinker dynamically selects strategies, iterates until
; convergence, and synthesizes results. It uses the small model for
; routing/scoring when available, reserving the large model for
; actual reasoning. Active when Thinking=meta.
; =========================================================================
[MetaThinking]
; Enabled: Master switch for meta-thinking.
;   0 = disabled (falls through to direct generation)
;   1 = enabled
Enabled=1

; MaxIterations: Maximum refinement iterations before stopping.
; Each iteration may select a different strategy based on what is needed.
; Range: 1-10. Higher = more thorough but slower.
MaxIterations=5

; QualityThreshold: Score (0-10) at which the answer is considered
; complete. Higher values demand more thorough answers but cost more
; LLM calls. Recommended: 6-8.
QualityThreshold=7

; NoImprovementLimit: Stop after N consecutive iterations with no score
; increase. Prevents infinite loops when the model cannot improve further.
NoImprovementLimit=2

; UseSmallForRouting: Use the small model for strategy selection.
;   0 = use large model (better routing but slower)
;   1 = use small model (faster, may make worse routing decisions)
UseSmallForRouting=1

; UseSmallForScoring: Use the small model for quality assessment.
;   0 = use large model (better judgment)
;   1 = use small model (faster)
UseSmallForScoring=1

; QuickModeThreshold: Queries shorter than this many characters skip
; meta-thinking entirely. Simple greetings and confirmations do not
; need iterative refinement.
QuickModeThreshold=20


; =========================================================================
; [AutoClassifier] - Contrastive auto thinking classifier
; =========================================================================
; When Thinking=auto, this classifier scores candidate thinking
; strategies against each query to select the best approach. It uses
; contrastive batches where strategies compete against each other
; and against a NONE baseline.
; =========================================================================
[AutoClassifier]
; ScoreThreshold: Minimum score (0-10) for a strategy to be considered.
; Below this, no strategy is selected and the query goes direct.
ScoreThreshold=3

; TieMargin: Scores within this margin of the top score are considered
; tied. A tiebreaker LLM call resolves ties between candidates.
TieMargin=2

; QuickExitMinLen: Queries shorter than this many characters skip LLM
; scoring entirely and go direct. Prevents wasting LLM calls on "ok",
; "yes", "why?" etc.
QuickExitMinLen=15

; CandidatesPerCall: How many strategy candidates to score per LLM call.
;   3-5 = small contrastive batches (recommended for small models 0.5B-3B)
;   0   = all candidates in one call (best for capable models 7B+)
CandidatesPerCall=3

; MinCandidatesPerCall: Minimum strategies per batch for contrastive
; comparison. Prevents single-candidate scoring where the LLM has no
; alternatives and tends to over-score.
MinCandidatesPerCall=3

; UseRegexPreFilter: Pre-filter candidates using regex patterns before
; LLM scoring.
;   0 = all enabled strategies are candidates (recommended for
;       multi-language content where regex patterns are unreliable)
;   1 = regex patterns narrow the candidate list before LLM scoring
UseRegexPreFilter=0

; MaxClassifyChars: Maximum characters from the user's question sent
; to the classifier model. Longer queries are truncated for classification
; only - the full question is still passed to the selected strategy.
MaxClassifyChars=2000

; SkillFolder: Path to folder containing .md thinking skill definitions.
; Relative to the executable directory.
SkillFolder=skills


; =========================================================================
; [Sampling] - LLM sampling parameters
; =========================================================================
; These control the token generation behavior of the LLM. They apply
; globally unless overridden by a provider's own sampling settings.
; =========================================================================
[Sampling]
; MaxTokens: Maximum tokens to generate per response.
; Range: 256-32768. Higher allows longer responses but uses more time.
MaxTokens=4096

; TopK: Only consider the top K most probable tokens at each step.
;   40 = good general default
;   0  = disabled (consider all tokens)
TopK=40

; TopP: Nucleus sampling - only consider tokens whose cumulative
; probability reaches P. Range: 0.0-1.0.
;   0.95 = good default (excludes very unlikely tokens)
;   1.0  = disabled
TopP=0.95

; MinP: Minimum probability threshold relative to the top token.
; Tokens with probability < MinP * top_token_prob are excluded.
;   0.05 = good default
;   0.0  = disabled
MinP=0.05

; RepeatPenalty: Penalize tokens that have already appeared in the
; context window. Range: 1.0-2.0.
;   1.0  = no penalty
;   1.10 = mild penalty (good for natural text)
;   1.15 = moderate penalty (reduces repetition in multi-persona output)
RepeatPenalty=1.10

; RepeatLastN: How many recent tokens to check for repetition.
;   64 = good default
;   0  = disabled
RepeatLastN=64

; Seed: Random seed for reproducibility.
;   0 = random seed each time
;   Any positive integer = deterministic output
Seed=0

; BatchSize: Number of tokens to process in parallel during prompt
; evaluation. Higher values use more memory but are faster.
;   512  = conservative (low VRAM)
;   2048 = good for GPUs with 8GB+ VRAM
;   4096 = aggressive (16GB+ VRAM)
BatchSize=2048

; Threads: CPU threads for computation.
;   0 = auto-detect (recommended)
Threads=0

; FlashAttn: Use Flash Attention for faster inference.
;   0 = standard attention
;   1 = flash attention (requires GPU support, recommended)
FlashAttn=1


; =========================================================================
; [Retrieval] - RAG retrieval settings
; =========================================================================
; Controls how many document chunks are retrieved and how they are
; filtered before being passed to the LLM as context.
; =========================================================================
[Retrieval]
; TopK: Number of final chunks to include in the LLM context.
; More chunks = more context but slower and may dilute relevance.
;   5-10  = lightweight queries
;   15-25 = code analysis, detailed questions
TopK=20

; MinScore: Minimum similarity score (0.0-1.0) for a chunk to be
; included. Chunks below this score are discarded.
;   0.1 = permissive (include most results)
;   0.3 = moderate filtering
;   0.5 = strict (only highly similar chunks)
MinScore=0.1

; RelevanceGateThreshold: If the best retrieval score is below this
; threshold, the results are considered topically irrelevant and the
; orchestrator falls through to direct LLM generation (no RAG context).
;   0.0  = disabled (always use retrieved context)
;   0.25 = lenient gate
;   0.30 = moderate gate (recommended)
;   0.45 = strict gate
RelevanceGateThreshold=0.30

; RetrieveTopK: Number of candidate chunks to retrieve before reranking.
; The reranker (if enabled) selects the best TopK from this larger pool.
; Should be significantly larger than TopK for effective reranking.
;   40-80 = good range when reranker is enabled
;   Same as TopK if reranker is disabled
RetrieveTopK=80


; =========================================================================
; [Context] - Context window and prompt composition
; =========================================================================
; Controls how retrieved chunks are assembled into the LLM prompt,
; including context windowing and hierarchical summarization.
; =========================================================================
[Context]
; Window: Number of adjacent chunks to include around each retrieved
; chunk. Provides surrounding context for better understanding.
;   0 = no windowing (exact chunks only)
;   1 = include 1 chunk before and after
;   3 = wider window (good for code where surrounding lines matter)
Window=3

; MergeAdjacent: Merge overlapping or adjacent chunks into single
; blocks to avoid repetition.
;   0 = keep chunks separate
;   1 = merge adjacent chunks (recommended)
MergeAdjacent=1

; TemplateName: Prompt template to use for RAG responses.
;   code     - Optimized for code analysis and generation
;   default  - General-purpose template
;   academic - Formal, citation-heavy template
TemplateName=code

; MaxPromptChars: Maximum total characters for the assembled prompt.
;   0 = no character limit (use MaxContextTokens instead)
MaxPromptChars=0

; MaxContextTokens: Maximum context window size in tokens.
;   0 = auto from model (recommended - uses the model's native limit)
MaxContextTokens=0

; SummarizationEnabled: When retrieved chunks exceed the context limit,
; summarize them in batches rather than simply truncating.
;   0 = truncate excess chunks
;   1 = hierarchical summarization (preserves information from all chunks)
SummarizationEnabled=1

; SummarizationBatchSize: Number of chunks per summarization batch.
SummarizationBatchSize=10

; SummarizationTemplate: Custom prompt template for summarization.
; Use %CHUNKS% for the batch content and %QUESTION% for the user query.
; Leave empty to use the built-in default template.
SummarizationTemplate=


; =========================================================================
; [Query] - Query orchestration mode and behavior
; =========================================================================
; Controls the overall query processing pipeline. The Mode setting is the
; PIPELINE CEILING that determines which processing phases are available.
;
; IMPORTANT: This setting and [LLM] Thinking work together but are
; independent. See "PIPELINE ARCHITECTURE" at the top of this file
; for the full explanation with examples.
;
; Summary: Mode controls "how much machinery", Thinking controls "how the
; LLM reasons". Thinking only fires when Mode=deep.
; =========================================================================
[Query]
; Mode: Orchestration complexity level. Each mode is a SUPERSET of the
; previous one (deep includes everything agentic does, etc.).
;
;   direct    - Raw LLM + vision only. No retrieval, no routing, no tools,
;               no thinking. Fastest. Use for quick chat or brainstorming.
;
;   retrieval - Adds RAG retrieval (vector + BM25 hybrid search).
;               Single LLM call with retrieved context. No router, no
;               HyDE, no tools, no refinement.
;
;   guided    - Adds the LLM router, skill detection, HyDE, query
;               expansion, source refinement, and vision integration.
;               The router classifies the query and selects the best
;               retrieval strategy. Skills inject specialized prompts.
;
;   agentic   - Adds tool use (code agent, upload agent, web search,
;               external tools) and query decomposition into sub-questions
;               that are answered individually and synthesized.
;
;   deep      - Adds multi-persona thinking strategies (critique, debate,
;               code, auto, meta). This is the ONLY mode where the
;               [LLM] Thinking setting takes effect.
;
; Can be changed at runtime: /mode direct|retrieval|guided|agentic|deep
Mode=deep

; FollowUp: Enable follow-up question detection. When enabled, the
; system detects when a query refers to a previous answer and
; automatically includes prior context.
;   0 = treat each query independently
;   1 = detect and handle follow-ups (recommended)
FollowUp=1

; ContextBoost: Boost retrieval scores for chunks from sources
; mentioned in the conversation context.
;   0 = no boosting
;   1 = boost contextually relevant sources
ContextBoost=1

; ContextBoostFactor: Multiplier for the context boost.
; Higher values more aggressively favor previously mentioned sources.
ContextBoostFactor=3.0

; ExpandPromptEnabled: Enable meta-prompting for vague queries.
; Rewrites vague queries into more specific retrieval queries.
;   0 = disabled (recommended for focused code work)
;   1 = expand vague queries
ExpandPromptEnabled=0

; ExpandPromptMinWords: Minimum word count below which a query is
; considered too short to be expanded.
ExpandPromptMinWords=6

; ExpandPromptIntents: Comma-separated list of intent types that
; trigger prompt expansion when ExpandPromptEnabled=1.
ExpandPromptIntents=broad_concept,howto


; =========================================================================
; [Router] - Query router settings
; =========================================================================
; The router classifies incoming queries and decides which processing
; path to take (direct, RAG, code agent, decomposition, etc.).
; =========================================================================
[Router]
; AllowCodeAgent: Allow the router to activate the code agent for
; live source file inspection.
;   0 = never use code agent
;   1 = router may activate code agent when appropriate
AllowCodeAgent=1

; AllowAgent: Allow the router to activate agentic tool use.
;   0 = never use agent tools
;   1 = router may activate tools (upload, web, etc.)
AllowAgent=1

; AllowDecompose: Allow the router to decompose complex queries into
; sub-questions that are answered individually and synthesized.
;   0 = always answer as a single query
;   1 = allow decomposition for complex multi-part questions
AllowDecompose=1

; AllowAnchors: Allow the router to inject anchor terms from the
; knowledge base into retrieval queries for better precision.
;   0 = no anchor injection
;   1 = inject relevant anchors
AllowAnchors=1

; MaxSubQuestions: Maximum number of sub-questions when decomposing.
MaxSubQuestions=5

; Budget: Maximum number of LLM calls allowed per query.
; Higher budgets allow more thorough multi-persona pipelines.
;   3-5   = simple queries
;   8-10  = moderate complexity
;   12-15 = deep multi-persona pipelines
Budget=10

; Incremental: Stream partial results as they become available.
;   0 = wait for complete answer
;   1 = stream incrementally (recommended for interactive use)
Incremental=1


; =========================================================================
; [CodeTools] - Code agent configuration
; =========================================================================
; The code agent provides live source file access capabilities including
; file search, read, analyze, modify, and dependency tracing.
; =========================================================================
[CodeTools]
; FileExtRegex: Regex matching source file extensions the code agent
; can access. Adjust for your project's languages.
FileExtRegex=\w+\.(pas|dpr|dpk|inc|pp|lpr)

; StructuralKeywords: Comma-separated keywords that trigger structural
; code analysis (listing classes, methods, types, etc.).
StructuralKeywords=methods,functions,procedures,types,classes,properties,records,interfaces,constants,members,fields,uses,declarations,defined,definitions,structure

; CodeAgentGuideline: Instruction text injected into the router prompt
; to help it decide when to activate the code agent.
CodeAgentGuideline=Use CODEAGENT=yes when the user asks structural questions about source files, wants code review, bug finding, refactoring, test generation, or any live source analysis.

; PromptOverhead: Estimated token overhead for code agent prompts.
; Used to reserve space in the context window.
PromptOverhead=1200


; =========================================================================
; [Hybrid] - Hybrid search (vector + BM25 keyword search)
; =========================================================================
; Combines dense vector search with sparse keyword search using
; Reciprocal Rank Fusion (RRF) for better retrieval quality.
; =========================================================================
[Hybrid]
; Enabled: Enable hybrid search.
;   0 = vector search only
;   1 = vector + BM25 hybrid (recommended)
Enabled=1

; RRFk: Reciprocal Rank Fusion constant. Controls how much rank
; position matters vs. raw score. Standard value is 60.
RRFk=60

; VectorWeight: Weight for vector (semantic) search results (0.0-1.0).
; Higher values favor semantic similarity.
VectorWeight=0.75

; BM25Weight: Weight for BM25 (keyword) search results (0.0-1.0).
; Higher values favor exact keyword matches.
BM25Weight=0.25

; Stopwords: Stopword list for BM25.
;   default = built-in English stopwords
;   none    = no stopwords
;   <path>  = custom stopword file (one word per line)
Stopwords=default


; =========================================================================
; [Conversation] - Conversation memory
; =========================================================================
; Manages multi-turn conversation context with tiered summarization.
; =========================================================================
[Conversation]
; Memory: Enable conversation memory across turns.
;   0 = each query is independent (no history)
;   1 = maintain conversation history (recommended)
Memory=1

; Tier1Size: Number of recent exchanges kept in full detail.
; These are included verbatim in the prompt.
Tier1Size=3

; Tier2Size: Number of older exchanges kept as summaries.
; These are compressed to save context space.
Tier2Size=5

; SummaryMaxWords: Maximum words per exchange summary in Tier 2.
SummaryMaxWords=150


; =========================================================================
; [Experience] - User experience settings
; =========================================================================
; Controls streaming, metrics display, and narration (showing the
; internal reasoning process to the user).
; =========================================================================
[Experience]
; MetricsConsole: Show performance metrics in the console.
;   0 = no metrics
;   1 = show timing, token counts, retrieval scores
MetricsConsole=1

; MetricsWeb: Show performance metrics in the web chat UI.
MetricsWeb=0

; NarrationConsole: Show internal reasoning narration in the console.
;   0 = silent operation
;   1 = show router decisions, strategy selection, etc.
NarrationConsole=0

; NarrationWeb: Show internal reasoning narration in the web chat UI.
;   0 = clean responses only
;   1 = show reasoning process (educational, good for development)
NarrationWeb=1

; Streaming: Enable token-by-token streaming of responses.
;   0 = wait for complete response
;   1 = stream tokens as generated (recommended)
Streaming=1

; MaxContinuations: Maximum number of automatic continuations when the
; model hits its token limit mid-response. Each continuation is a new
; LLM call that picks up where the previous left off.
;   0 = no continuations (response may be truncated)
;   1-5 = allow continuations for long responses
MaxContinuations=3


; =========================================================================
; [Output] - Response output formatting
; =========================================================================
[Output]
; Filter: Post-processing filter applied to LLM output.
; Leave empty for no filtering.
Filter=

; Renderer: Output renderer for console display.
;   ansi     - ANSI color codes (terminal)
;   plain    - No formatting
;   markdown - Markdown formatting
Renderer=ansi

; Timestamps: Show timestamps on each response.
;   0 = no timestamps
;   1 = show timestamps
Timestamps=0


; =========================================================================
; [Upload] - File upload and workspace management
; =========================================================================
; Controls file upload handling, per-session workspaces, and automatic
; ingestion of uploaded files into the RAG knowledge base.
; =========================================================================
[Upload]
; Enabled: Enable file upload functionality.
;   0 = uploads disabled
;   1 = uploads enabled
Enabled=1

; MaxFileSizeMB: Maximum file size for uploads in megabytes.
;   0 = no limit
MaxFileSizeMB=30

; AllowedExtensions: Comma-separated list of allowed file extensions.
; Leave empty to allow all supported file types.
AllowedExtensions=

; IngestToRAG: Automatically ingest uploaded files into the workspace
; RAG knowledge base for retrieval.
;   0 = store files only (no indexing)
;   1 = ingest into RAG (recommended)
IngestToRAG=1

; SourcePrefix: Prefix added to source labels for uploaded files.
; Helps distinguish uploaded content from pre-indexed content.
SourcePrefix=upload:

; AllowCodeToolAccess: Allow the code agent to read uploaded files.
;   0 = code agent cannot access uploads
;   1 = code agent can read uploaded source files
AllowCodeToolAccess=1

; WorkspaceRoot: Root directory for per-session file workspaces.
; Each chat session gets a subdirectory under this root.
; Use a full path. Relative paths are relative to the executable.
WorkspaceRoot=uploads

; MaxWorkspaceMB: Maximum total size per workspace in megabytes.
;   0 = no limit
MaxWorkspaceMB=0

; RAGScope: How uploaded content integrates with the main knowledge base.
;   session  - Only searchable within the upload session
;   combined - Merged with the main knowledge base for searching
RAGScope=combined

; IngestImages: Use the vision model to describe uploaded images and
; ingest the description into the per-session workspace knowledge.
; This controls PER-SESSION UPLOAD ingestion of images.
; The separate [Vision] IngestImages controls main knowledge base
; ingestion of images found in [Source.N] folders.
; Requires vision to be enabled ([Vision] Enabled=1) and a vision-capable
; model (either via provider ClipModelPath or standalone [Vision] config).
;   0 = skip image ingestion (faster)
;   1 = describe and ingest images (slower, requires vision model)
IngestImages=1

; IngestPDFs: Extract text from uploaded PDFs and ingest into
; workspace knowledge.
;   0 = skip PDF ingestion
;   1 = extract and ingest PDF text (recommended)
IngestPDFs=1

; AsyncIngestion: Process heavy files (images, PDFs) in a background
; queue. A single worker thread ensures the GPU is not overloaded.
;   0 = synchronous ingestion (blocks until complete)
;   1 = background ingestion (recommended)
AsyncIngestion=1


; =========================================================================
; [ChatServer] - Web chat server settings
; =========================================================================
; theMIMER includes a built-in HTTP server that serves a web-based
; chat interface. It supports multiple concurrent sessions, file
; upload/download, and streaming responses.
; =========================================================================
[ChatServer]
; Enabled: Start the web chat server on launch.
;   0 = console-only mode
;   1 = start web server
Enabled=1

; Port: HTTP port for the web chat server.
; Access the chat at http://localhost:<Port>/
Port=8080

; Permissions: Access level for the web chat.
;   full     - All features including file upload, tools, settings
;   chat     - Chat only, no file management or settings
;   readonly - View responses only, no input
Permissions=full

; Title: Browser tab title for the web chat interface.
Title=theMimer

; SessionTimeout: Minutes of inactivity before a session expires.
;   0 = sessions never expire
SessionTimeout=60

; MaxSessions: Maximum number of concurrent chat sessions.
MaxSessions=50

; CustomGuiPath: Path to a custom HTML/CSS/JS directory for the web
; chat interface. Leave empty to use the built-in default UI.
CustomGuiPath=

; PoolSize: Number of pre-allocated inference contexts for concurrent
; web sessions. Each context reserves memory for one active inference.
;   1 = single user (least memory)
;   2 = recommended for small teams
PoolSize=2

; MaxRequestBodySize: Maximum POST request body size in bytes.
; Limits upload sizes at the HTTP level.
;   0        = unlimited (not recommended)
;   10485760 = 10 MB (reasonable default)
MaxRequestBodySize=10485760


; =========================================================================
; [Vision] - Vision model settings
; =========================================================================
; Vision enables the LLM to understand and describe images. There are
; two ways to configure vision, depending on your setup:
;
; PATH A: Provider-integrated vision (RECOMMENDED)
;   The main chat model handles both text and vision. Configure this by
;   setting ClipModelPath on the provider in providers.ini:
;     [LLMProvider.1]
;     ClipModelPath=mmproj-MyModel-BF16.gguf
;   In this case, leave ClipModel and VisionModel EMPTY below.
;   The [Vision] section only controls behavior settings (formats,
;   upload limits, etc.) and the Enabled flag.
;
; PATH B: Dedicated standalone vision model
;   A separate model is loaded exclusively for vision tasks. This is
;   useful when your main chat model does not support vision, or when
;   you want a specialized vision model.
;   Set BOTH ClipModel (required) and VisionModel (the GGUF) below.
;   The standalone model runs independently from the chat model.
;
; In both cases, Enabled=1 is required to activate vision features.
; =========================================================================
[Vision]
; Enabled: Master switch for vision capabilities.
;   0 = disabled (no image understanding)
;   1 = enabled
;
; When Enabled=1 and ClipModel is empty, vision is provided by the
; chat model's ClipModelPath in providers.ini (Path A).
; When Enabled=1 and ClipModel is set, a standalone vision model is
; loaded (Path B).
Enabled=0

; VisionModel: GGUF model file for dedicated standalone vision (Path B).
; This is a SEPARATE model loaded only for vision, independent of the
; main chat model. Leave empty to use the chat model for vision (Path A).
; Example: Qwen3.5-9B-Vision-Q8_0.gguf
;VisionModel=

; ClipModel: CLIP projector model (mmproj GGUF) for standalone vision
; (Path B). Required when VisionModel is set. Must match the VisionModel.
; Leave empty when using provider-integrated vision (Path A) - the
; provider's ClipModelPath in providers.ini is used instead.
; Example: mmproj-Qwen3.5-9B-BF16.gguf
ClipModel=

; GPULayers: GPU layers for the standalone vision model (Path B only).
;   99 = all layers on GPU
;   0  = CPU only
;GPULayers=99

; ContextSize: Context size for standalone vision model (Path B only).
;ContextSize=8192

; Threads: CPU threads for standalone vision model (Path B only).
;   0 = auto-detect
;Threads=0

; DebugOutput: Show detailed vision processing debug information.
;   0 = quiet
;   1 = show vision debug output
DebugOutput=0

; MaxImageSizeMB: Maximum image file size in megabytes.
MaxImageSizeMB=20

; SupportedFormats: Comma-separated list of supported image file
; extensions (with leading dot).
SupportedFormats=.jpg,.jpeg,.png,.gif,.webp,.bmp

; IngestImages: Use the vision model to describe image files found in
; [Source.N] knowledge base folders and ingest the descriptions as
; searchable text during startup and /ingest.
; This controls MAIN KNOWLEDGE BASE ingestion of images.
; The separate [Upload] IngestImages controls per-session upload ingestion.
;   0 = skip image files in source folders (faster startup)
;   1 = describe and ingest images from source folders (requires vision)
IngestImages=0

; IncludeMetadata: Include image metadata (dimensions, format, EXIF)
; alongside the vision description.
;   0 = description only
;   1 = include metadata
IncludeMetadata=1

; DescribePrompt: Custom prompt for image description. The image is
; sent to the vision model with this prompt.
; Leave empty to use the built-in default prompt.
DescribePrompt=

; MaxDescriptionLength: Maximum characters for image descriptions.
;   0 = no limit (use model's natural length)
MaxDescriptionLength=0

; AllowImageUpload: Allow users to upload images via the web chat.
;   0 = image upload disabled
;   1 = image upload enabled
AllowImageUpload=1

; ShowImagePreview: Show image thumbnails in the web chat UI.
;   0 = filename only
;   1 = show preview thumbnail
ShowImagePreview=1

; AllowDragDrop: Allow drag-and-drop image upload in the web chat.
;   0 = use file picker only
;   1 = allow drag-and-drop
AllowDragDrop=1

; ImagePlaceholder: Token used in prompts to mark where the image
; is inserted. Must match what the vision pipeline expects.
ImagePlaceholder=<image>

; MaxImagesPerMessage: Maximum number of images per chat message.
MaxImagesPerMessage=5


; =========================================================================
; [ImageGeneration] - AI image generation (Stable Diffusion / DALL-E)
; =========================================================================
; Provides text-to-image generation using either a local Stable Diffusion
; model (via sd.dll) or an external OpenAI-compatible API (DALL-E).
;
; Local generation requires:
;   - sd.dll in the executable directory
;   - A Stable Diffusion model file (.safetensors or .ckpt)
;   - Sufficient GPU VRAM (4GB+ for SD 1.5, 8GB+ for SDXL)
;
; To disable image generation entirely, set Enabled=0.
; =========================================================================
[ImageGeneration]
; Enabled: Enable image generation.
;   0 = disabled
;   1 = enabled
Enabled=0

; Provider: Image generation backend.
;   local  - Local Stable Diffusion via sd.dll
;   openai - OpenAI DALL-E API (requires OpenAI API key)
Provider=local

; --- Local Stable Diffusion settings ---

; SDModel: Path to the Stable Diffusion model file.
; Supports .safetensors and .ckpt formats.
; Examples:
;   v1-5-pruned.safetensors          (SD 1.5, ~4GB VRAM)
;   sd_xl_base_1.0.safetensors       (SDXL, ~8GB VRAM)
SDModel=

; VAEModel: Optional separate VAE model file.
; Leave empty to use the VAE built into the main model.
VAEModel=

; TAESDModel: Optional TAESD model for fast preview decoding.
; Leave empty if not using preview decoding.
TAESDModel=

; LoraDir: Directory containing LoRA weight files.
; Leave empty if not using LoRAs.
LoraDir=

; EmbedDir: Directory containing textual inversion embeddings.
; Leave empty if not using embeddings.
EmbedDir=

; --- OpenAI DALL-E settings (when Provider=openai) ---

; OpenAIBaseURL: API endpoint for OpenAI image generation.
; Default: https://api.openai.com/v1
; Can point to compatible APIs (e.g., Azure OpenAI).
;OpenAIBaseURL=https://api.openai.com/v1

; OpenAIApiKey: API key for OpenAI image generation.
;OpenAIApiKey=

; Model: OpenAI model name for image generation.
;   dall-e-2 - Older, cheaper
;   dall-e-3 - Higher quality, more expensive
;Model=dall-e-3

; --- Generation defaults ---

; OutputDir: Directory where generated images are saved.
; Relative to the executable directory or a full path.
OutputDir=generated_images

; DefaultSize: Default image dimensions (WIDTHxHEIGHT).
;   SD 1.5:  512x512, 512x768, 768x512
;   SDXL:    1024x1024, 1024x768, 768x1024
;   DALL-E:  1024x1024, 1792x1024, 1024x1792
DefaultSize=512x512

; Sampler: Diffusion sampling algorithm.
;   euler_a   - Euler Ancestral (fast, good quality, recommended)
;   euler     - Euler (deterministic)
;   heun      - Heun (slower, sometimes higher quality)
;   dpm2      - DPM2
;   dpmpp2s_a - DPM++ 2S Ancestral
;   dpmpp2m   - DPM++ 2M
;   dpmpp2mv2 - DPM++ 2M v2
;   ipndm     - iPNDM
;   ipndm_v   - iPNDM v
;   lcm       - LCM (fast, fewer steps needed)
Sampler=euler_a

; Steps: Number of diffusion steps.
;   15-20 = fast generation (good for euler_a)
;   25-40 = higher quality
;   4-8   = for LCM sampler
Steps=20

; CfgScale: Classifier-Free Guidance scale. Controls how closely the
; image follows the prompt.
;   1.0 = minimal guidance (more creative/random)
;   7.0 = standard (good balance)
;   12-15 = strong guidance (very literal, may over-saturate)
CfgScale=7.0

; Guidance: Additional guidance parameter (model-dependent).
;   1.0 = standard
Guidance=1.0

; Seed: Random seed for image generation.
;   -1 = random seed each time
;   Any positive integer = reproducible images
;Seed=-1

; ClipSkip: Number of CLIP layers to skip.
;   -1 = auto (recommended)
;   1  = no skip (standard for SD 1.x)
;   2  = skip last layer (common for anime models)
;ClipSkip=-1

; BatchCount: Number of images to generate per request.
;   1 = single image (default)
;BatchCount=1

; Threads: CPU threads for image generation.
;   0 = auto-detect
;Threads=0

; SaveToWorkspace: Save generated images to the active workspace.
;   0 = save to OutputDir only
;   1 = also copy to workspace (visible in web chat file list)
SaveToWorkspace=1

; DebugOutput: Show detailed image generation debug output.
;   0 = quiet
;   1 = show progress and technical details
DebugOutput=0


; =========================================================================
; [Sources] - Knowledge base source definitions
; =========================================================================
; Define the documents, code folders, and web pages to ingest into the
; RAG knowledge base. Sources are numbered starting from 1.
;
; Source types:
;   folder     - Directory of text/PDF files
;   codefolder - Directory of source code files
;   url        - Web page or sitemap to crawl
;
; INGESTION
; ---------
; Sources are ingested when you run /ingest (or /ingest <n> for a
; specific source). The ingested content is stored in the vector
; database specified by [Embedding].VectorStore.
;
; COMMON FIELDS (all source types):
;   Type            - Source type: folder, codefolder, url
;   Label           - Display label for this source (shown in results)
;
; FOLDER FIELDS:
;   Path            - Directory path (local or UNC)
;   Mask            - File mask (e.g. *.pdf, *.txt, *.md)
;   Recurse         - Recurse into subdirectories (0/1)
;   FileRegex       - Regex filter on filenames (empty = no filter)
;   FileRegexNegate - Invert the regex: 0 = include matches,
;                     1 = exclude matches
;   Splitter        - Text splitting strategy: default, web
;
; CODEFOLDER FIELDS:
;   Path            - Directory path to source code
;   Mask            - File mask (e.g. *.pas, *.cs, *.js)
;   Recurse         - Recurse into subdirectories (0/1)
;   Label           - Source label
;   AllowProjectCopy - Allow copying files to project workspace (0/1)
;   IngestToRAG     - Ingest code into the vector database (0/1)
;   Group           - Optional grouping label
;   FileRegex       - Regex filter on filenames
;   FileRegexNegate - Invert the regex filter (0/1)
;
; URL FIELDS:
;   URL             - Starting URL to crawl
;   Label           - Source label
;   Depth           - Crawl depth (0 = this page only, 1 = follow links)
;   MaxPages        - Maximum pages to crawl (0 = unlimited)
;   SameDomain      - Stay on the same domain (0/1)
;   URLRegex        - Regex filter on discovered URLs
;   URLRegexNegate  - Invert the URL regex: 0 = include matches,
;                     1 = exclude matches
;   Splitter        - Text splitting strategy: default, web
;
; EXAMPLE SOURCES
; ---------------
; Below are example source definitions. Adjust paths and URLs to match
; your project. Add or remove sources as needed.
; =========================================================================
[Sources]
; Count: Total number of source definitions below.
Count=2

; --- Example 1: PDF documentation folder ---
[Source.1]
Type=folder
Path=C:\MyProject\docs
Mask=*.pdf
Recurse=1
Label=Documentation
FileRegex=
FileRegexNegate=0
Splitter=default

; --- Example 2: Delphi source code folder ---
[Source.2]
Type=codefolder
Path=C:\MyProject\source
Mask=*.pas
Recurse=1
Label=MyProject Source
AllowProjectCopy=0
IngestToRAG=1
Group=
FileRegex=
FileRegexNegate=0
