; =========================================================================
; theMIMER.settings.tools.ini - External Tools Configuration
; =========================================================================
;
; Copyright 2026 Components4Developers - Kim Bo Madsen
; Proprietary Commercial License
;
; PURPOSE
; -------
; This file defines external command-line tools that the code agent can
; invoke during agentic processing. When the agent determines that a
; tool would help answer the user's question (e.g., compiling code to
; check for errors, searching source files, running tests), it calls
; the tool and incorporates the output into its response.
;
; STRUCTURE
; ---------
; Each tool is defined in a section named [ExternalTool.<ToolName>].
; The <ToolName> becomes the tool identifier that the agent uses in
; its reasoning (e.g., "I should use delphi_compile to check this").
;
; HOW IT WORKS
; ------------
; 1. The user asks a question (e.g., "check if this compiles")
; 2. The agent recognizes the need for a tool (delphi_compile)
; 3. The agent provides an input string (the file path)
; 4. theMIMER launches the external process with the configured
;    arguments, replacing {input} with the agent's input
; 5. The process output (stdout/stderr) is captured and returned
;    to the agent as the tool result
; 6. The agent uses the result to formulate its answer
;
; SECURITY
; --------
; - AllowedPaths restricts file-based tools to specific directory trees
; - TimeoutMs prevents runaway processes
; - MaxOutputKB limits memory usage from verbose tools
; - Tools only execute when the agent explicitly requests them
;
; FIELDS
; ------
;   Description   - Text shown to the agent so it knows when to use
;                   this tool. Be specific about what the tool does
;                   and what kind of input it expects.
;
;   Executable    - Full path to the executable file. No shell expansion
;                   or environment variable substitution.
;                   Special: {input} as the Executable means the input
;                   itself is the executable (e.g., running a test .exe).
;
;   ArgTemplate   - Command-line arguments. {input} is replaced by the
;                   agent's input string. Use quotes around {input} to
;                   handle paths with spaces.
;
;   WorkDir       - Working directory for the process.
;                   Empty string = directory of the input file (if
;                   InputIsFile=1) or the executable directory.
;
;   AllowedPaths  - Semicolon-separated list of allowed directory roots.
;                   When InputIsFile=1, the input file must be under one
;                   of these directories. Leave empty to allow any path.
;
;   TimeoutMs     - Kill the process after this many milliseconds.
;                   0 = no timeout (dangerous, not recommended).
;                   Recommended: 10000-60000 for most tools.
;
;   MaxOutputKB   - Truncate captured output at this size in kilobytes.
;                   0 = use default (64 KB).
;                   Increase for verbose tools like compilers.
;
;   CaptureStdErr - Include stderr in the captured output.
;                   0 = stdout only
;                   1 = merge stderr into result (usually what you want)
;
;   InputIsFile   - Validate the agent's input as a file path.
;                   0 = input is free-form text (search pattern, etc.)
;                   1 = input must be a valid file path under AllowedPaths
;
;   Enabled       - Temporarily disable a tool without deleting it.
;                   0 = disabled (agent will not see this tool)
;                   1 = enabled
;
; TIPS
; ----
; - Keep descriptions clear and specific. The agent uses them to decide
;   which tool to call. Mention what the input should be.
; - Use InputIsFile=0 for tools where the input is a search pattern,
;   command argument, or other non-file data.
; - Set CaptureStdErr=1 for compilers and build tools (errors go to
;   stderr).
; - Set generous TimeoutMs for compilers (60000+) and tight timeouts
;   for search tools (10000-15000).
;
; EXAMPLES
; --------
; The examples below are configured for Delphi development. Adjust
; paths, masks, and tools for your development environment and language.
; =========================================================================


; =========================================================================
; Delphi 64-bit compiler
; =========================================================================
; Input: path to the .pas or .dpr file to compile.
; The agent sees [ExitCode: 0] for success, non-zero for failure.
; Error messages like "E2003 Undeclared identifier" are returned verbatim.
;
; SETUP: Adjust the Executable path to match your RAD Studio installation.
; The -I flag should point to your RTL library path.
; =========================================================================
[ExternalTool.delphi_compile]
Description=Compile a Delphi source file with dcc64.exe and return the compiler output including any errors. Use this after editing a .pas file to check for compile errors.
Executable=C:\Program Files (x86)\Embarcadero\Studio\23.0\bin\dcc64.exe
ArgTemplate=-Q -B -W- -NSWinapi;System.Win;System;Xml;Data "{input}"
WorkDir=C:\MyProject\source
AllowedPaths=C:\MyProject\source
TimeoutMs=60000
MaxOutputKB=128
CaptureStdErr=1
InputIsFile=1
Enabled=0


; =========================================================================
; Delphi 32-bit compiler (for legacy projects)
; =========================================================================
; Same as above but uses dcc32.exe for Win32 targets.
; =========================================================================
[ExternalTool.delphi_compile32]
Description=Compile a Delphi source file with dcc32.exe (32-bit). Use for legacy projects that target Win32.
Executable=C:\Program Files (x86)\Embarcadero\Studio\23.0\bin\dcc32.exe
ArgTemplate=-Q -B -W- "{input}"
WorkDir=C:\MyProject\source
AllowedPaths=C:\MyProject\source
TimeoutMs=60000
MaxOutputKB=128
CaptureStdErr=1
InputIsFile=1
Enabled=0


; =========================================================================
; DUnitX console test runner
; =========================================================================
; Input: path to the compiled test executable (.exe).
; Returns test results: passes, failures, error details.
;
; The Executable is set to {input} because the input IS the executable
; (the compiled test project). The --no-pause flag prevents the test
; runner from waiting for a keypress.
; =========================================================================
[ExternalTool.run_tests]
Description=Run a compiled DUnitX test executable and return the test results. Shows which tests passed, failed, or errored. Use after compiling test projects.
Executable={input}
ArgTemplate=--no-pause
WorkDir=
AllowedPaths=C:\MyProject\tests
TimeoutMs=120000
MaxOutputKB=256
CaptureStdErr=1
InputIsFile=1
Enabled=0


; =========================================================================
; Grep / ripgrep - search across source files
; =========================================================================
; Input: search pattern (text, not a file path).
; Not a file tool - InputIsFile=0, no AllowedPaths restriction needed
; since ripgrep only reads the configured path in the ArgTemplate.
;
; SETUP: Install ripgrep (rg.exe) from https://github.com/BurntSushi/ripgrep
; Adjust the search path in ArgTemplate to your source directory.
; =========================================================================
[ExternalTool.grep_source]
Description=Search for a pattern across all Delphi source files in the project. Input is the search text or regex. Returns matching lines with file and line number. Use to find where a class, method, or variable is used.
Executable=C:\Tools\rg.exe
ArgTemplate=--type-add "delphi:*.pas" -t delphi -n --no-heading "{input}" C:\MyProject\source
WorkDir=C:\MyProject\source
AllowedPaths=
TimeoutMs=15000
MaxOutputKB=64
CaptureStdErr=0
InputIsFile=0
Enabled=0


; =========================================================================
; Git diff - show uncommitted changes
; =========================================================================
; Input: filename for a single file, or "." for all changes.
; InputIsFile=0 because "." is not a real file path.
;
; SETUP: Adjust WorkDir to your Git repository root.
; Requires Git to be installed and on the PATH or use full path.
; =========================================================================
[ExternalTool.git_diff]
Description=Show the uncommitted changes to a file or the whole project using git diff. Input can be a filename for a single file or '.' for all changes. Use before and after making edits to confirm what changed.
Executable=C:\Program Files\Git\bin\git.exe
ArgTemplate=diff --stat --unified=3 -- "{input}"
WorkDir=C:\MyProject
AllowedPaths=
TimeoutMs=10000
MaxOutputKB=128
CaptureStdErr=0
InputIsFile=0
Enabled=0


; =========================================================================
; DFM parser (optional custom tool)
; =========================================================================
; Input: path to a .dfm file.
; Returns a human-readable component tree with Name/ClassName/events.
;
; You would build this small utility yourself or use a third-party tool.
; It reads the DFM text/binary and prints the component hierarchy.
; =========================================================================
[ExternalTool.dfm_parse]
Description=Parse a Delphi .dfm form file and return the component tree: component names, class names, and event handler assignments. Use to understand the UI layout before editing the corresponding .pas file.
Executable=C:\Tools\DfmParser.exe
ArgTemplate="{input}"
WorkDir=
AllowedPaths=C:\MyProject\source
TimeoutMs=10000
MaxOutputKB=64
CaptureStdErr=1
InputIsFile=1
Enabled=0
