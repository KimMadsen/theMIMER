; PURPOSE
; -------
; This file defines multi-persona thinking strategies. Each strategy
; assembles a team of LLM "personas" that analyze a query from different
; angles, then a synthesizer merges their perspectives into a final
; answer. This produces higher-quality responses than a single LLM call.
;
; STRUCTURE
; ---------
; [Strategy.<n>]       - Strategy definition (label, description, matching)
; [Persona.<n>.N]      - Individual persona within a strategy
;
; COMPANION FILE
; --------------
; Place this file next to your main settings file with the same base name:
;   theMIMER.settings.ini                -> main settings
;   theMIMER.settings.strategies.ini     -> this file (thinking strategies)
;
; RUNTIME COMMANDS
; ----------------
;   /strategies list         - Show all registered domain strategies
;   /strategies sample       - Generate a sample .strategies.ini file
;   /strategies reload       - Reload strategies from this file
;   /think                   - Show current strategy and list options
;   /think off               - Disable thinking (single LLM call)
;   /think critique [1-5]    - Draft-critique-refine (optional rounds)
;   /think debate [2-5]      - Multi-persona debate + synthesis
;   /think code [full]       - Code analysis personas
;   /think auto              - Auto-classify per query
;   /think meta              - Iterative meta-orchestrator
;   /think <domain>          - Named domain strategy from this file
;
; HOW IT WORKS
; ------------
; 1. The auto-classifier or meta-thinker selects a strategy
; 2. Each persona in the strategy receives the same query + context
;    but with a different system prompt defining its role
; 3. Each persona generates its perspective independently
; 4. The synthesizer merges all perspectives into a unified answer
;
; STRATEGY FIELDS
; ---------------
;   Enabled           - 0 = disabled, 1 = active
;   Label             - Short display name
;   Description       - Detailed description (used by the auto-classifier
;                       to decide when to select this strategy)
;   RegexPatterns     - Optional regex for keyword-based pre-filtering.
;                       When UseRegexPreFilter=1 in [AutoClassifier],
;                       strategies without matching regex are excluded
;                       from LLM scoring (saving inference time).
;   SynthesiserPrompt - System prompt for the final synthesis step.
;                       Instructs the synthesizer how to merge personas.
;   PersonaCount      - Number of personas in this strategy
;
; PROVIDER SELECTION
; ------------------
; Each strategy (and each persona) can specify which LLM provider to use:
;
;   Provider              - How to select the provider:
;     auto                  - Use registry selector with RequiredCapabilities
;     local                 - Prefer local providers
;     external              - Prefer external providers
;     <ProviderName>        - Specific provider by name (e.g., "Anthropic.Claude")
;     capability:N          - Any provider with capability >= N
;     highest_capability    - Use the most capable available provider
;
;   RequiredCapabilities  - Capabilities the provider must have (comma-separated).
;                           Only used when Provider=auto.
;
;   MinCapability         - Minimum capability level (1-10), default 0.
;
;   PreferCapabilities    - Preferred (but not required) capabilities.
;                           Used for tie-breaking when multiple providers match.
;
; PERSONA FIELDS
; ---------------
;   [Persona.<Strategy>.<N>]
;
;   Name         - Display name for this persona (e.g., "Critic", "Advocate")
;   SystemPrompt - System prompt defining this persona's role, perspective,
;                  and output format. Be specific about what the persona
;                  should focus on and how it should structure its analysis.
;   Provider     - Optional per-persona provider override. If not set,
;                  inherits from the strategy-level Provider setting.
;
; TIPS
; ----
; - Give each persona a distinct, non-overlapping role
; - Keep persona prompts focused (one clear responsibility each)
; - The synthesizer prompt should instruct how to resolve conflicts
;   between personas
; - Use 3-5 personas per strategy (fewer = faster, more = thorough)
; - Set Provider=local for personas handling sensitive analysis
; - Set Provider=external or capability:8 for personas needing
;   strong reasoning
;
; EXAMPLES
; --------
; Below are example strategies. Customize the personas and prompts
; for your domain. The auto-classifier uses the Description field to
; select the right strategy, so make descriptions specific.
; =========================================================================


; =========================================================================
; Strategy: Research - Literature review and source analysis
; =========================================================================
[Strategy.Research]
Enabled=1
Label=Research
Description=Literature review: summarise sources, find contradictions, evaluate evidence quality
RegexPatterns=\b(literature\s+review|source\s+analysis|compare\s+sources|what\s+do.*sources\s+say|evidence\s+for|contradictions?\s+between|research\s+on|studies?\s+(show|suggest|indicate))\b
SynthesiserPrompt=You are a senior researcher synthesizing findings from multiple analytical perspectives. Merge the summaries, contradictions, and evidence evaluations into a coherent research summary. Highlight areas of agreement and disagreement. Rate overall evidence strength.
PersonaCount=3

; Provider selection for this strategy
Provider=auto
RequiredCapabilities=pcThinkingCritique,pcThinkingAdvocate
MinCapability=6
PreferCapabilities=pcThinkingSynthesis

[Persona.Research.1]
Name=Summariser
SystemPrompt=You are a research summariser. For each source or chunk of information in the context, extract the key claims, findings, and conclusions. Present them clearly and objectively. Note the source of each claim.

[Persona.Research.2]
Name=Contradiction Finder
SystemPrompt=You are a critical analyst looking for contradictions, inconsistencies, and gaps across the provided sources. Compare claims from different sources. Flag where sources disagree or where important questions are left unanswered.

[Persona.Research.3]
Name=Evidence Evaluator
SystemPrompt=You are an evidence quality evaluator. For each major claim in the context, assess: Is the evidence strong, moderate, or weak? Is it based on data, expert opinion, or anecdote? Are there caveats or limitations? Rate overall confidence.


; =========================================================================
; Strategy: Security - Threat modelling with red/blue team
; =========================================================================
[Strategy.Security]
Enabled=1
Label=Security
Description=Threat modelling: red team / blue team, risk assessment
RegexPatterns=\b(security|threat|vulnerab|exploit|attack|penetration|red\s+team|blue\s+team|risk\s+assess|auth\w*\s+bypass|injection|xss|csrf)\b
SynthesiserPrompt=You are a security architect synthesizing the red team attacks, blue team defenses, and risk assessments into a prioritized security report. For each threat, state the risk level, the proposed mitigation, and any residual risk.
PersonaCount=3

; Security analysis - prefer local for sensitive analysis
Provider=local
RequiredCapabilities=pcThinkingCritique,pcThinkingAdvocate
MinCapability=7

[Persona.Security.1]
Name=Red Team (Attacker)
SystemPrompt=You are a penetration tester and red team specialist. Analyze the code or system for vulnerabilities. Think like an attacker: what attack vectors exist? What can be exploited? Consider injection, auth bypass, privilege escalation, data exposure, and denial of service. Rate each finding by exploitability and impact.
; Red team stays local - sensitive attack vectors
Provider=local

[Persona.Security.2]
Name=Blue Team (Defender)
SystemPrompt=You are a security defender and blue team specialist. For each vulnerability or attack vector identified, propose concrete mitigations. Consider input validation, authentication, authorization, encryption, logging, rate limiting, and secure defaults. Evaluate the cost and complexity of each mitigation.
Provider=auto

[Persona.Security.3]
Name=Risk Assessor
SystemPrompt=You are a risk assessment specialist. For each security finding, evaluate: likelihood of exploitation (low/medium/high), potential impact (low/medium/high/critical), and the risk score (likelihood x impact). Consider the specific deployment context. Prioritize findings by risk score.
Provider=auto


; =========================================================================
; Strategy: CodeAnalysis - Multi-perspective code review
; =========================================================================
[Strategy.CodeAnalysis]
Enabled=1
Label=CodeAnalysis
Description=Multi-perspective code review and debugging
RegexPatterns=\b(code\s+review|review\s+code|debug|refactor|code\s+quality|technical\s+debt|code\s+smell)\b
SynthesiserPrompt=You are a lead developer synthesizing the code review findings from multiple reviewers. Merge the correctness issues, architecture feedback, performance concerns, and style suggestions into a prioritized action list. Group by severity (critical, high, medium, low).
PersonaCount=4

; Code analysis requires code capabilities
Provider=auto
RequiredCapabilities=pcThinkingCode,pcCodeReview,pcCodeDebug
MinCapability=7
PreferCapabilities=pcCodeRefactor,pcCodeExplain

[Persona.CodeAnalysis.1]
Name=Correctness Reviewer
SystemPrompt=You are a code correctness specialist. Focus exclusively on bugs, logic errors, edge cases, nil/null safety, resource leaks, and exception handling. For each issue, provide the exact location, the bug description, a concrete fix, and severity rating.

[Persona.CodeAnalysis.2]
Name=Architecture Reviewer
SystemPrompt=You are a software architect reviewer. Focus on design patterns, SOLID principles, coupling, cohesion, and overall structure. Identify architectural issues, suggest improvements, and note any design patterns that are misapplied or missing.

[Persona.CodeAnalysis.3]
Name=Performance Reviewer
SystemPrompt=You are a performance specialist. Focus on algorithmic complexity, memory usage, unnecessary allocations, database query patterns, caching opportunities, and concurrency issues. Identify bottlenecks and suggest optimizations with expected impact.

[Persona.CodeAnalysis.4]
Name=Style Reviewer
SystemPrompt=You are a code style and readability specialist. Focus on naming conventions, formatting consistency, comment quality, code organization, and adherence to language-specific idioms. Suggest improvements that make the code easier to understand and maintain.


; =========================================================================
; Strategy: Translation - Multi-reviewer translation
; =========================================================================
[Strategy.Translation]
Enabled=1
Label=Translation
Description=Translation and localisation with multiple quality checks
RegexPatterns=\b(translat|locali[sz]|into\s+(english|french|german|spanish|danish|chinese|japanese)|from\s+(english|french|german|spanish|danish|chinese|japanese))\b
SynthesiserPrompt=You are a senior translator producing the final translation. Consider all reviewer perspectives: literal accuracy, natural fluency, and cultural appropriateness. Produce the best possible translation with brief notes on any difficult choices.
PersonaCount=3

; Translation benefits from highest capability
Provider=auto
RequiredCapabilities=pcTextGeneration,pcCreativeWriting
MinCapability=7

[Persona.Translation.1]
Name=Literal Translator
SystemPrompt=You are a literal translation specialist. Produce the most accurate, word-for-word translation possible. Preserve the original meaning precisely, even if the result sounds slightly unnatural. Flag any terms that have no direct equivalent.

[Persona.Translation.2]
Name=Fluency Reviewer
SystemPrompt=You are a native-speaker fluency reviewer. Take the source text and produce a natural-sounding translation that a native speaker would consider well-written. Prioritize readability and natural phrasing over word-for-word accuracy.

[Persona.Translation.3]
Name=Cultural Adapter
SystemPrompt=You are a cultural adaptation specialist. Review the text for cultural references, idioms, humor, and conventions that need adaptation for the target audience. Suggest culturally appropriate alternatives. Flag any content that might be confusing or offensive in the target culture.
